<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree shadows — Shader Playground</title>
  <script src="/nav.js?v=2" defer></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1814; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) {
    document.body.innerHTML = '<p style="color:#ccc;padding:24px;font-family:sans-serif">WebGL required</p>';
    return;
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.floor(window.innerWidth * dpr);
    const h = Math.floor(window.innerHeight * dpr);
    if (canvas.width === w && canvas.height === h) return;
    canvas.width = w;
    canvas.height = h;
    gl.viewport(0, 0, w, h);
  }
  resize();
  window.addEventListener('resize', resize);

  function mkS(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }
  function mkP(vs, fs) {
    const p = gl.createProgram();
    gl.attachShader(p, mkS(gl.VERTEX_SHADER, vs));
    gl.attachShader(p, mkS(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(p));
    }
    return p;
  }

  const VS = `
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

  const FS = `
precision highp float;
uniform vec2 uRes;
uniform float uTime;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float n2(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
    mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),
    f.y
  );
}

float blob(vec2 p, vec2 c, vec2 radii, float rot, float soft) {
  vec2 q = p - c;
  float cr = cos(rot);
  float sr = sin(rot);
  q = vec2(cr * q.x - sr * q.y, sr * q.x + cr * q.y);
  float d = length(q / radii);
  return smoothstep(1.0 + soft, 0.0, d);
}

float sdSeg(vec2 p, vec2 a, vec2 b) {
  vec2 pa = p - a;
  vec2 ba = b - a;
  float h = clamp(dot(pa, ba) / max(dot(ba, ba), 1e-6), 0.0, 1.0);
  return length(pa - ba * h);
}

void main() {
  vec2 frag = gl_FragCoord.xy;
  vec2 uv = frag / uRes;
  float t = uTime;

  vec2 p = uv;
  p.x += (p.y - 0.5) * 0.1;
  p += vec2(sin(t * 0.29), cos(t * 0.26)) * 0.018;

  vec3 gHi = vec3(0.78, 0.70, 0.52);
  vec3 gLo = vec3(0.48, 0.42, 0.33);
  vec3 col = mix(gHi, gLo, pow(uv.y, 0.9));
  col += (hash(floor(frag * 0.6)) - 0.5) * 0.018;

  float sh = 0.0;
  sh += 0.5 * blob(p, vec2(0.32 + sin(t * 0.17) * 0.045, 0.4 + cos(t * 0.15) * 0.035),
                    vec2(0.36, 0.24), t * 0.07, 0.38);
  sh += 0.42 * blob(p, vec2(0.74 + cos(t * 0.14) * 0.05, 0.48 + sin(t * 0.19) * 0.04),
                    vec2(0.34, 0.3), -t * 0.055, 0.42);
  sh += 0.32 * blob(p, vec2(0.52 + sin(t * 0.12) * 0.055, 0.34 + cos(t * 0.11) * 0.03),
                    vec2(0.28, 0.2), t * 0.045, 0.32);

  sh += 0.28 * blob(p, vec2(0.08 + sin(t * 0.21) * 0.03, 0.55), vec2(0.22, 0.35), t * 0.12, 0.45);

  vec2 b0a = vec2(0.12 + sin(t * 0.31) * 0.02, 0.88 + cos(t * 0.19) * 0.04);
  vec2 b0b = b0a + vec2(0.28 + 0.06 * sin(t * 0.37), -0.52);
  sh += (1.0 - smoothstep(0.0, 0.11, sdSeg(p, b0a, b0b))) * 0.2;

  vec2 b1a = vec2(0.42 + cos(t * 0.28) * 0.025, 0.92);
  vec2 b1b = b1a + vec2(0.18, -0.48);
  sh += (1.0 - smoothstep(0.0, 0.09, sdSeg(p, b1a, b1b))) * 0.18;

  vec2 b2a = vec2(0.68 + sin(t * 0.24) * 0.03, 0.85);
  vec2 b2b = b2a + vec2(-0.22 + 0.05 * cos(t * 0.33), -0.45);
  sh += (1.0 - smoothstep(0.0, 0.085, sdSeg(p, b2a, b2b))) * 0.17;

  vec2 b3a = vec2(0.88 + cos(t * 0.2) * 0.02, 0.78);
  vec2 b3b = b3a + vec2(-0.15, -0.38);
  sh += (1.0 - smoothstep(0.0, 0.07, sdSeg(p, b3a, b3b))) * 0.14;

  vec2 w = vec2(n2(p * 7.0 + t * 0.08), n2(p * 7.0 - vec2(t * 0.06, 0.0))) * 0.05;
  float leaf = n2(p * 28.0 + w + vec2(t * 0.12, t * 0.09));
  leaf = smoothstep(0.42, 0.58, leaf) * 0.12;
  sh += leaf;

  sh = clamp(sh, 0.0, 1.0);
  col *= 1.0 - sh * 0.82;

  vec3 sun = vec3(1.0, 0.96, 0.86);
  col += sun * pow(1.0 - uv.y, 2.8) * 0.07 * (1.0 - sh * 0.6);

  gl_FragColor = vec4(col, 1.0);
}
`;

  const prog = mkP(VS, FS);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
  const locPos = gl.getAttribLocation(prog, 'aPos');
  const locRes = gl.getUniformLocation(prog, 'uRes');
  const locTime = gl.getUniformLocation(prog, 'uTime');

  let start = performance.now();
  function frame() {
    requestAnimationFrame(frame);
    const t = (performance.now() - start) * 0.001;
    gl.useProgram(prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(locPos);
    gl.vertexAttribPointer(locPos, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(locRes, canvas.width, canvas.height);
    gl.uniform1f(locTime, t);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  frame();
})();
</script>
</body>
</html>
