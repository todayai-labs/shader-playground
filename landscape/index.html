<!-- ═══════════════════════════════════════════
     BACKGROUND: Sparkles ocean (3-pass pipeline)
     ═══════════════════════════════════════════ -->
<script>
(function() {
const bgCanvas = document.getElementById('bg');
const frameEl = document.querySelector('.frame');
const dpr = Math.min(window.devicePixelRatio, 2);
let W, H;

function resizeBg() {
  W = frameEl.clientWidth * dpr;
  H = frameEl.clientHeight * dpr;
  bgCanvas.width = W;
  bgCanvas.height = H;
}
resizeBg();

const gl = bgCanvas.getContext('webgl2', { alpha: false });
if (!gl) return;

const quadVert = `#version 300 es
precision highp float;
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const oceanFrag = `#version 300 es
precision highp float;
out vec4 outColor;
uniform float uTime;
uniform vec2 uResolution;
uniform sampler2D uNoiseTexture;

float noise(vec2 p) {
    vec2 i = floor(p); vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    float a = texture(uNoiseTexture, (i + vec2(0.5, 0.5)) * 0.00390625).r;
    float b = texture(uNoiseTexture, (i + vec2(1.5, 0.5)) * 0.00390625).r;
    float c = texture(uNoiseTexture, (i + vec2(0.5, 1.5)) * 0.00390625).r;
    float d = texture(uNoiseTexture, (i + vec2(1.5, 1.5)) * 0.00390625).r;
    return a + (b - a) * u.x + (c - a) * u.y + (a - b - c + d) * u.x * u.y - 0.5;
}

const float angle = 3.14;
const float sA = sin(angle), cA = cos(angle);
const mat2 octRot = mat2(cA, sA, -sA, cA);

float fbm(vec3 pos, int limit) {
    float res = 0.0, freq = 1.0, amp = 1.0;
    for (int i = 0; i < 9; i++) {
        if (i >= limit) break;
        res += noise(freq * (pos.xz + uTime * (0.06 * float(9 - i + 1)))) * amp;
        freq *= 1.75; amp *= 0.5; pos.xz *= octRot;
    }
    return res;
}

const float waveHeight = 2.7, waveScale = 0.08, oceanRadius = 400.0;

float oceanHeight(vec2 xz, int oct) {
    float r = waveHeight * fbm(vec3(xz.x, 0.0, xz.y) * waveScale, oct);
    return mix(-100.0, r, 1.0 - smoothstep(oceanRadius * 0.7, oceanRadius, length(xz)));
}

const vec3 camPos = vec3(0.0, 6.0, 14.0);
const vec3 camTarget = vec3(0.0, 2.0, -40.0);
const vec3 sunDir = normalize(vec3(-0.5, 0.65, -0.5));
const vec3 sunColor = vec3(1.0, 0.92, 0.82);

mat3 camMat() {
    vec3 f = normalize(camTarget - camPos);
    vec3 r = normalize(cross(f, vec3(0,1,0)));
    return mat3(r, cross(r,f), f);
}

vec3 skyColor(vec3 rd) {
    vec3 sky = mix(vec3(0.78,0.82,0.86),
                   mix(vec3(0.55,0.70,0.85), vec3(0.38,0.55,0.80),
                       smoothstep(0.0, 0.6, max(rd.y,0.0))),
                   smoothstep(-0.02, 0.2, rd.y));
    float sd = max(dot(rd, sunDir), 0.0);
    sky += sunColor * pow(sd, 256.0) * 1.5 + sunColor * pow(sd, 8.0) * 0.2;
    sky += vec3(0.9,0.88,0.85) * exp(-max(rd.y,0.0)*4.0) * 0.15;
    return sky;
}

float approxHit(vec3 ro, vec3 rd, float lo, float hi) {
    for (int j = 0; j < 6; j++) {
        float m = 0.5*(lo+hi); vec3 p = ro+rd*m;
        if (p.y - oceanHeight(p.xz,3) < 0.0) hi = m; else lo = m;
    }
    return 0.5*(lo+hi);
}

void main() {
    float fov = 50.0, asp = uResolution.x / uResolution.y;
    float sc = tan(fov*0.5*3.14159/180.0);
    vec2 ndc = gl_FragCoord.xy / uResolution * 2.0 - 1.0;
    vec3 rd = camMat() * normalize(vec3(ndc.x*sc*asp, ndc.y*sc, 1.0));
    vec3 color = skyColor(rd);

    if (rd.y < 0.0) {
        float ceil = waveHeight*1.1, hd = 0.0, ss = 0.0;
        if (camPos.y > ceil) hd = (ceil - camPos.y)/rd.y;
        for (int i = 0; i < 24; i++) {
            vec3 p = camPos + rd*hd;
            float df = p.y - oceanHeight(p.xz, 3);
            if (df < 0.01) { hd = approxHit(camPos, rd, hd-ss, hd); break; }
            ss = max(df*0.5, 0.1+hd*0.01); hd += ss;
            if (hd > 1200.0) { hd = 1e6; break; }
        }
        if (hd < 1e5) {
            vec3 p = camPos + rd*hd;
            float eps = (0.05/uResolution.y)*pow(hd, 1.55);
            float dx = oceanHeight(p.xz-vec2(eps,0),7) - oceanHeight(p.xz+vec2(eps,0),7);
            float dz = oceanHeight(p.xz-vec2(0,eps),7) - oceanHeight(p.xz+vec2(0,eps),7);
            vec3 n = normalize(vec3(dx, 2.0*eps, dz));
            vec3 vd = -rd;
            float fr = 0.02 + 0.98*pow(1.0-max(dot(n,vd),0.0), 5.0);
            vec3 refl = skyColor(reflect(rd, n));
            float cr = clamp(p.y/waveHeight+0.5, 0.0, 1.0);
            vec3 wc = mix(vec3(0.29,0.43,0.53), vec3(0.18,0.37,0.42), cr);
            vec3 amb = wc*0.3, dif = wc*max(dot(n,sunDir),0.0)*0.7;
            float sp = pow(max(dot(n, normalize(sunDir+vd)), 0.0), 256.0);
            vec3 spec = sunColor*sp*3.0;
            vec3 bl = normalize(-sunDir+n*0.3);
            vec3 sss = vec3(0.49,0.86,0.79)*pow(max(dot(vd,bl),0.0),4.0)*1.1*cr;
            color = mix(amb+dif+sss, refl, fr) + spec;
            float fog = 1.0-exp(-length(p.xz)*0.003);
            color = mix(color, skyColor(rd)*0.95, fog*0.5);
        }
    }
    color = clamp((color*(2.51*color+0.03))/(color*(2.43*color+0.59)+0.14), 0.0, 1.0);
    outColor = vec4(pow(color, vec3(1.0/2.2)), 1.0);
}
`;

const sparkleMaskFrag = `#version 300 es
precision highp float;
out vec4 outColor;
uniform float time; uniform vec2 resolution;
uniform sampler2D inputBuffer; uniform sampler2D prevBuffer;
uniform float fadeOut;
#define TAU 6.2831853

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
float getLuma(vec3 c) { return dot(c, vec3(0.299,0.587,0.114)); }
float sparkleThreshold(float l) { return pow(smoothstep(0.7,1.0,l),2.0)*0.4; }
float baseRadius(float l, vec2 px) {
    return step(0.9,l)*20.0*2.5*mix(1.0,0.8,px.y/resolution.y);
}

vec3 sparkleShape(vec2 px, vec2 cc, float rad, float ct) {
    vec2 ctr = (cc+0.5)*20.0;
    vec2 tp = px - ctr;
    float pd = length(tp), pa = atan(tp.y, tp.x);
    float h1 = hash(cc+vec2(7,3));
    float wb = 1.0+0.04*sin(pa*2.0+time*0.3+h1*TAU)+0.02*sin(pa*3.0+time*0.2);
    float feIn = smoothstep(0.0, 0.1, ct);
    float feOut = 1.0-smoothstep(0.2, 1.0, ct);
    float fe = feIn*feOut;
    float cd = (pd/wb)/max(rad*0.6,1.0);
    float core = (1.0-smoothstep(0.34,0.85,clamp(cd,0.0,1.0)))*fe;
    float ge = max(rad*0.6,1.0)*wb*0.45;
    float gd = max(length(tp)-ge,0.0);
    float glow = 0.0;
    if (gd < 20.0) glow = pow(1.0-clamp(gd/20.0,0.0,1.0),2.0)*0.65*fe;
    float sc = floor(mix(4.0,5.0,h1));
    float gr = 1.0-pow(1.0-clamp(ct/0.4,0.0,1.0),3.0);
    float bs = TAU/sc;
    float ai = floor((pa+TAU/14.0*(0.5+0.5*sin(time*0.3)))/bs+0.5);
    float ba = TAU; float sl = 0.0; float so = 1.0;
    for (float o = -1.0; o <= 1.0; o += 1.0) {
        float idx = mod(ai+o,sc);
        float sa = -TAU/14.0*(0.5+0.5*sin(time*0.3)) + idx*bs;
        float ad = abs(mod(pa-sa+3.14159,TAU)-3.14159);
        if (ad < ba) { ba = ad; sl = mix(3.0,4.0,hash(cc+vec2(idx*7.13,idx*11.97)))*gr; so = mix(0.8,1.0,hash(cc+vec2(idx*13.37,idx*17.53))); }
    }
    float sd = cd/sl, sw = 2.0*pow(1.0-clamp(sd,0.0,1.0),mix(6.0,50.0,clamp((sl-3.0)/6.0,0.0,1.0)));
    float streak = smoothstep(sw,sw*0.15,ba)*(1.3-clamp(sd,0.0,1.0))*step(sd,1.0)*so*fe;
    float sgd = sin(max(ba-sw,0.0))*pd;
    float sgl = (1.0-clamp(sgd/17.0,0.0,1.0))*(0.9-clamp(sd,0.0,1.0))*step(sd,1.0)*so*fe;
    return vec3(core, max(streak,sgl), glow);
}

void main() {
    vec2 px = gl_FragCoord.xy, uv = px/resolution;
    vec4 cs = texture(inputBuffer, uv);
    if (cs.a < 0.01) { outColor = vec4(0); return; }
    vec2 cell = floor(px/20.0);
    vec4 maxM = vec4(0);
    for (int dx = -4; dx <= 4; dx++) for (int dy = -4; dy <= 4; dy++) {
        vec2 cc = cell + vec2(float(dx),float(dy));
        vec2 ctr = (cc+0.5)*20.0;
        vec2 tp2 = px-ctr;
        if (dot(tp2,tp2) > 40000.0) continue;
        float cl = getLuma(texture(inputBuffer, ctr/resolution).rgb);
        float po = hash(cc+vec2(42,13));
        float cd2 = mix(0.8,1.2,hash(cc+vec2(77,31)));
        float lt = time+po*cd2;
        float ci = floor(lt/cd2), ct2 = mod(lt,cd2);
        if (hash(cc+vec2(ci*1.731,ci*2.399)) >= sparkleThreshold(cl)) continue;
        float rad = baseRadius(cl,ctr) * mix(0.9,1.1,hash(cc+vec2(123,456)));
        if (rad < 0.5) continue;
        float sr = rad*5.0+rad*0.5; sr*=sr;
        if (dot(tp2,tp2) > sr) continue;
        maxM.rgb = max(maxM.rgb, sparkleShape(px, cc, rad, ct2));
    }
    outColor = vec4(max(texture(prevBuffer, uv).rgb * fadeOut, maxM.rgb), 0.0);
}
`;

const compositeFrag = `#version 300 es
precision highp float;
out vec4 outColor;
uniform sampler2D inputBuffer;
uniform sampler2D sparkleMask;
uniform vec2 uResolution;

vec3 hardLight(vec3 b, vec3 bl) {
    return mix(2.0*b*bl, 1.0-2.0*(1.0-b)*(1.0-bl), step(0.5,bl));
}

void main() {
    vec2 uv = gl_FragCoord.xy / uResolution;
    vec4 inp = texture(inputBuffer, uv);
    vec3 m = texture(sparkleMask, uv).rgb;
    vec3 base = inp.rgb;
    vec3 wc = mix(base, hardLight(base, vec3(1)), m.r);
    vec3 wg = mix(wc, hardLight(wc, vec3(1,0.9,0.83)), m.b*(1.0-m.r));
    outColor = vec4(mix(wg, hardLight(wg, vec3(1,0.97,0.87)), m.g), 1.0);
}
`;

function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p); return p;
}

const oceanProg = mkProg(quadVert, oceanFrag);
const sparkleProg = mkProg(quadVert, sparkleMaskFrag);
const compProg = mkProg(quadVert, compositeFrag);

const quad = new Float32Array([-1,-1,1,-1,-1,1,1,1]);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
function bindQuad(p) { const a = gl.getAttribLocation(p,'aPos'); gl.enableVertexAttribArray(a); gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0); }

const nSz = 256, nD = new Uint8Array(nSz*nSz);
for (let i = 0; i < nD.length; i++) nD[i] = Math.random()*255|0;
const nTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, nTex);
gl.texImage2D(gl.TEXTURE_2D,0,gl.R8,nSz,nSz,0,gl.RED,gl.UNSIGNED_BYTE,nD);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);

function mkFBO(w,h) {
  const fbo = gl.createFramebuffer(), tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA8,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fbo, tex };
}

let oceanFBO = mkFBO(W,H), maskA = mkFBO(W,H), maskB = mkFBO(W,H), maskSwap = false;

gl.useProgram(oceanProg); bindQuad(oceanProg);
const oL = n => gl.getUniformLocation(oceanProg, n);

gl.useProgram(sparkleProg); bindQuad(sparkleProg);
const sL = n => gl.getUniformLocation(sparkleProg, n);
gl.uniform2f(sL('resolution'), W, H);
gl.uniform1f(sL('fadeOut'), 0.82);

gl.useProgram(compProg); bindQuad(compProg);
const cL = n => gl.getUniformLocation(compProg, n);

const t0 = performance.now();

window.__bgFrame = function bgFrame() {
  const t = (performance.now() - t0) * 0.001;

  gl.useProgram(oceanProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, oceanFBO.fbo);
  gl.viewport(0,0,W,H);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, nTex);
  gl.uniform1i(oL('uNoiseTexture'),0);
  gl.uniform2f(oL('uResolution'),W,H);
  gl.uniform1f(oL('uTime'),t);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  const rM = maskSwap?maskB:maskA, wM = maskSwap?maskA:maskB;
  gl.useProgram(sparkleProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, wM.fbo);
  gl.viewport(0,0,W,H);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, oceanFBO.tex);
  gl.uniform1i(sL('inputBuffer'),0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, rM.tex);
  gl.uniform1i(sL('prevBuffer'),1);
  gl.uniform1f(sL('time'),t);
  gl.uniform2f(sL('resolution'),W,H);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  maskSwap = !maskSwap;

  gl.useProgram(compProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0,0,W,H);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, oceanFBO.tex);
  gl.uniform1i(cL('inputBuffer'),0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, wM.tex);
  gl.uniform1i(cL('sparkleMask'),1);
  gl.uniform2f(cL('uResolution'),W,H);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
};
})();
</script>

<script type="module">
import * as THREE from 'three';
import { createTree, TREE_CONFIGS } from '/garden/js/tree.js';
import { windUniforms, updateWind } from '/garden/js/wind.js';
import { createPostProcessing } from '/garden/js/postprocessing.js';

// PCSS soft shadows (copied from garden/js/main.js)
(function installPCSS() {
    const pcss = `
#define PENUMBRA_FILTER_SIZE float(15)
vec3 pcssRandRGB(vec2 uv){return vec3(fract(sin(dot(uv,vec2(12.75613,38.12123)))*13234.76575),fract(sin(dot(uv,vec2(19.45531,58.46547)))*43678.23431),fract(sin(dot(uv,vec2(23.67817,78.23121)))*93567.23423));}
vec3 pcssLowPass(vec2 uv){vec3 r=vec3(0);for(int dx=-1;dx<=1;dx++)for(int dy=-1;dy<=1;dy++)r+=pcssRandRGB(uv+vec2(float(dx),float(dy)));return r*0.111111111;}
vec3 pcssHighPass(vec2 uv){return pcssRandRGB(uv)-pcssLowPass(uv)+0.5;}
vec2 pcssVogelDisk(int idx,int cnt,float ang){float r=sqrt(float(idx)+0.5)/sqrt(float(cnt));float th=float(idx)*2.399963+ang;return vec2(cos(th),sin(th))*r;}
float pcssFindBlocker(sampler2D sm,vec2 uv,float cmp,float ang){float tx=1.0/float(textureSize(sm,0).x);float bds=0.0;float bc=0.0;for(int i=0;i<30;i++){vec2 o=(pcssVogelDisk(i,30,ang)*tx)*2.0*PENUMBRA_FILTER_SIZE;float d=unpackRGBAToDepth(texture2D(sm,uv+o));if(d<cmp){bds+=d;bc++;}}if(bc>0.0)return bds/bc;return -1.0;}
float pcssVogelFilter(sampler2D sm,vec2 uv,float zr,float fr,float ang){float tx=1.0/float(textureSize(sm,0).x);float sh=0.0;for(int i=0;i<30;i++){vec2 vs=pcssVogelDisk(i,30,ang)*tx;vec2 vo=vs*(1.0+fr*15.0);sh+=step(zr,unpackRGBAToDepth(texture2D(sm,uv+vo)));}return sh/30.0;}
float PCSS(sampler2D shadowMap,vec4 coords){vec2 uv=coords.xy;float zr=coords.z;float ang=pcssHighPass(gl_FragCoord.xy).r*PI2;float ab=pcssFindBlocker(shadowMap,uv,zr,ang);if(ab==-1.0)return 1.0;float pr=(zr-ab)/ab;return pcssVogelFilter(shadowMap,uv,zr,1.25*pr,ang);}
`;
    THREE.ShaderChunk.shadowmap_pars_fragment = THREE.ShaderChunk.shadowmap_pars_fragment
        .replace('#ifdef USE_SHADOWMAP', '#ifdef USE_SHADOWMAP\n' + pcss)
        .replace('#if defined( SHADOWMAP_TYPE_PCF )', '\nreturn PCSS(shadowMap, shadowCoord);\n#if defined( SHADOWMAP_TYPE_PCF )');
})();

const fgCanvas = document.getElementById('fg');
const frameEl = document.querySelector('.frame');

const renderer = new THREE.WebGLRenderer({
  canvas: fgCanvas, antialias: true, alpha: false
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(frameEl.clientWidth, frameEl.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#C5D0DA');

const camera = new THREE.PerspectiveCamera(
  28, frameEl.clientWidth / frameEl.clientHeight, 0.1, 200
);
camera.position.set(1.03, 34.83, 1.51);
camera.lookAt(2.31, 2.46, 0.87);

const dirLight = new THREE.DirectionalLight(0xF7EFD5, 10.5);
dirLight.position.set(-5, 42, -42);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
dirLight.shadow.bias = -0.0005;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xF2FDC2, 1);
fillLight.position.set(-5, 25, 28);
scene.add(fillLight);

scene.add(new THREE.AmbientLight(0xAEB983, 1.2));

const texLoader = new THREE.TextureLoader();
const concreteTex = texLoader.load('/garden/textures/concrete.webp');
concreteTex.colorSpace = THREE.SRGBColorSpace;
concreteTex.wrapS = concreteTex.wrapT = THREE.RepeatWrapping;

const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({
  map: concreteTex, color: 0x3D9040
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

for (const config of TREE_CONFIGS) {
  createTree(scene, config, windUniforms);
}

const postProcessing = createPostProcessing(renderer, scene, camera);

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();
  updateWind(elapsed, delta);
  postProcessing.render();
  if (window.__bgFrame) window.__bgFrame();
}

window.addEventListener('resize', () => {
  const w = frameEl.clientWidth, h = frameEl.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  postProcessing.resize(w, h);
});

animate();
</script>
</body>
</html>
