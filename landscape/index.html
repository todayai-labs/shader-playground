<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Landscape</title>
<script src="../nav.js?v=2" defer></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2a1a; }
  body { display: flex; justify-content: center; align-items: center; }
  .frame {
    position: relative;
    width: 100vw; height: 100vh;
    max-width: 430px;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="frame">
  <canvas id="c"></canvas>
</div>

<script>
const container = document.querySelector('.frame');
const canvas = document.getElementById('c');
const dpr = Math.min(window.devicePixelRatio, 2);

function resize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
}
resize();
window.addEventListener('resize', resize);

const gl = canvas.getContext('webgl2', { alpha: false, antialias: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:2em">WebGL2 required</p>'; throw ''; }

const vertSrc = `#version 300 es
precision highp float;
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const fragSrc = `#version 300 es
precision highp float;
out vec4 outColor;

uniform float uTime;
uniform vec2 uResolution;
uniform sampler2D uNoiseTexture;

/* ── Noise ── */
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    float a = texture(uNoiseTexture, (i + vec2(0.5)) * 0.00390625).r;
    float b = texture(uNoiseTexture, (i + vec2(1.5, 0.5)) * 0.00390625).r;
    float c = texture(uNoiseTexture, (i + vec2(0.5, 1.5)) * 0.00390625).r;
    float d = texture(uNoiseTexture, (i + vec2(1.5)) * 0.00390625).r;
    return a + (b - a) * u.x + (c - a) * u.y + (a - b - c + d) * u.x * u.y - 0.5;
}

float snoise(vec2 p) {
    vec2 i = floor(p); vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
               mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}

const float angle = 3.14;
const float sA = sin(angle);
const float cA = cos(angle);
const mat2 octRot = mat2(cA, sA, -sA, cA);

float fbm(vec3 pos, int limit) {
    float res = 0.0, freq = 1.0, amp = 1.0;
    for (int i = 0; i < 9; i++) {
        if (i >= limit) break;
        res += noise(freq * (pos.xz + uTime * (0.06 * float(9 - i + 1)))) * amp;
        freq *= 1.75; amp *= 0.5;
        pos.xz *= octRot;
    }
    return res;
}

float grassFbm(vec2 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 6; i++) {
        v += a * snoise(p);
        p *= 2.1; a *= 0.5;
    }
    return v;
}

/* ── Ocean ── */
const float waveHeight = 2.7;
const float waveScale = 0.08;
const float oceanRadius = 400.0;

float oceanHeight(vec2 xz, int octaves) {
    float result = waveHeight * fbm(vec3(xz.x, 0.0, xz.y) * waveScale, octaves);
    float dist = length(xz);
    float fade = 1.0 - smoothstep(oceanRadius * 0.7, oceanRadius, dist);
    return mix(-100.0, result, fade);
}

/* ── Camera ── */
const vec3 camPos = vec3(0.0, 6.0, 14.0);
const vec3 camTarget = vec3(0.0, 2.0, -40.0);
const vec3 sunDir = normalize(vec3(-0.5, 0.65, -0.5));
const vec3 sunColor = vec3(1.0, 0.92, 0.82);

mat3 getCameraMatrix() {
    vec3 forward = normalize(camTarget - camPos);
    vec3 right = normalize(cross(forward, vec3(0,1,0)));
    vec3 up = cross(right, forward);
    return mat3(right, up, forward);
}

/* ── Sky ── */
vec3 getSkyColor(vec3 rd) {
    vec3 warmSky = vec3(0.55, 0.70, 0.85);
    vec3 zenith = vec3(0.38, 0.55, 0.80);
    vec3 horizon = vec3(0.78, 0.82, 0.86);
    float t = max(rd.y, 0.0);
    vec3 sky = mix(horizon, mix(warmSky, zenith, smoothstep(0.0, 0.6, t)), smoothstep(-0.02, 0.2, rd.y));
    float sunDot = max(dot(rd, sunDir), 0.0);
    sky += sunColor * pow(sunDot, 256.0) * 1.5;
    sky += sunColor * pow(sunDot, 8.0) * 0.2;
    float haze = exp(-t * 4.0) * 0.15;
    sky += vec3(0.9, 0.88, 0.85) * haze;
    return sky;
}

/* ── Ocean raymarching ── */
float approximateIntersection(vec3 ro, vec3 rd, float tLow, float tHigh) {
    for (int j = 0; j < 6; j++) {
        float tMid = 0.5 * (tLow + tHigh);
        vec3 pm = ro + rd * tMid;
        float hm = oceanHeight(pm.xz, 3);
        if (pm.y - hm < 0.0) tHigh = tMid; else tLow = tMid;
    }
    return 0.5 * (tLow + tHigh);
}

float raymarchOcean(vec3 ro, vec3 rd, out float hitDist) {
    if (rd.y >= 0.0) { hitDist = 1e6; return 0.0; }
    float ceiling = waveHeight * 1.1;
    float maxDist = oceanRadius * 3.0;
    float startDist = 0.0;
    if (ro.y > ceiling) startDist = (ceiling - ro.y) / rd.y;
    hitDist = startDist;
    float stepSize = 0.0;
    for (int i = 0; i < 24; i++) {
        vec3 p = ro + rd * hitDist;
        float diff = p.y - oceanHeight(p.xz, 3);
        if (diff < 0.01) {
            hitDist = approximateIntersection(ro, rd, hitDist - stepSize, hitDist);
            return 1.0;
        }
        stepSize = max(diff * 0.5, 0.1 + hitDist * 0.01);
        hitDist += stepSize;
        if (hitDist > maxDist) break;
    }
    hitDist = 1e6;
    return 0.0;
}

vec3 getOceanNormal(vec3 p, float hitDist) {
    float eps = (0.05 / uResolution.y) * pow(hitDist, 1.55);
    float dx = oceanHeight(p.xz - vec2(eps, 0.0), 7) - oceanHeight(p.xz + vec2(eps, 0.0), 7);
    float dz = oceanHeight(p.xz - vec2(0.0, eps), 7) - oceanHeight(p.xz + vec2(0.0, eps), 7);
    return normalize(vec3(dx, 2.0 * eps, dz));
}

vec3 shadeOcean(vec3 ro, vec3 rd, vec3 p, float hitDist) {
    vec3 n = getOceanNormal(p, hitDist);
    vec3 viewDir = -rd;
    float cosTheta = max(dot(n, viewDir), 0.0);
    float fresnel = 0.02 + 0.98 * pow(1.0 - cosTheta, 5.0);

    vec3 skyRefl = getSkyColor(reflect(rd, n));

    vec3 surfCol = vec3(0.18, 0.37, 0.42);
    vec3 depthCol = vec3(0.29, 0.43, 0.53);
    vec3 scatterCol = vec3(0.49, 0.86, 0.79);

    float crest = clamp((p.y / waveHeight) + 0.5, 0.0, 1.0);
    vec3 baseWater = mix(depthCol, surfCol, crest);
    vec3 ambient = baseWater * 0.3;
    float sunAlign = max(dot(n, sunDir), 0.0);
    vec3 diffuse = baseWater * sunAlign * 0.7;
    vec3 halfDir = normalize(sunDir + viewDir);
    float spec = pow(max(dot(n, halfDir), 0.0), 256.0);
    vec3 specular = sunColor * spec * 3.0;
    vec3 backlitDir = normalize(-sunDir + n * 0.3);
    float scatter = pow(max(dot(viewDir, backlitDir), 0.0), 4.0) * 1.1 * crest;
    vec3 subsurface = scatterCol * scatter;

    vec3 waterColor = ambient + diffuse + subsurface;
    vec3 color = mix(waterColor, skyRefl, fresnel) + specular;

    float dist = length(p.xz);
    float fogFactor = 1.0 - exp(-dist * 0.003);
    color = mix(color, getSkyColor(rd) * 0.95, fogFactor * 0.5);

    return color;
}

/* ── Grass foreground ── */
vec3 grassColor(vec2 uv) {
    float grassLine = 0.28;
    float nx = uv.x * 6.0;
    float edgeNoise = grassFbm(vec2(nx, 0.5)) * 0.04
                    + grassFbm(vec2(nx * 3.0, 1.5)) * 0.015;
    float horizon = grassLine + edgeNoise;

    float bladeNoise = snoise(vec2(uv.x * 80.0, uTime * 0.08)) * 0.008
                     + snoise(vec2(uv.x * 150.0 + 50.0, uTime * 0.12)) * 0.004;
    float bladeEdge = horizon + bladeNoise;

    float alpha = smoothstep(bladeEdge + 0.008, bladeEdge - 0.003, uv.y);
    if (alpha < 0.001) return vec3(-1.0);

    float depth = clamp((horizon - uv.y) / horizon, 0.0, 1.0);

    vec3 lightGrass = vec3(0.32, 0.52, 0.16);
    vec3 midGrass = vec3(0.22, 0.40, 0.10);
    vec3 darkGrass = vec3(0.10, 0.22, 0.05);

    vec3 base = mix(lightGrass, midGrass, smoothstep(0.0, 0.4, depth));
    base = mix(base, darkGrass, smoothstep(0.4, 1.0, depth));

    float n1 = grassFbm(uv * 30.0 + uTime * 0.02) * 0.12;
    float n2 = snoise(uv * vec2(150.0, 8.0)) * 0.06;
    base += vec3(-n1 * 0.3, n1 + n2, -n1 * 0.2);

    float blade = snoise(vec2(uv.x * 180.0, uv.y * 12.0 + uTime * 0.04));
    float blade2 = snoise(vec2(uv.x * 60.0 + 10.0, uv.y * 40.0));
    base *= 0.95 + blade * 0.03 + blade2 * 0.02;

    float wind = sin(uv.x * 8.0 + uTime * 0.6 + depth * 3.0) * 0.03 * (1.0 - depth);
    base *= 1.0 + wind;

    float sunFace = smoothstep(0.3, 0.0, depth) * 0.1;
    base += sunColor * sunFace;

    float ao = smoothstep(0.0, 0.15, horizon - uv.y);
    base *= 0.7 + ao * 0.3;

    return mix(vec3(-1.0), base, alpha);
}

/* ── ACES tonemap ── */
vec3 tonemap(vec3 x) {
    float a=2.51, b=0.03, c=2.43, d=0.59, e=0.14;
    return clamp((x*(a*x+b))/(x*(c*x+d)+e), 0.0, 1.0);
}

/* ── Main ── */
void main() {
    vec2 uv = gl_FragCoord.xy / uResolution;
    vec3 color;

    vec3 grass = grassColor(uv);
    if (grass.r >= 0.0) {
        color = grass;
    } else {
        float fov = 50.0;
        float aspect = uResolution.x / uResolution.y;
        float fovScale = tan(fov * 0.5 * 3.14159 / 180.0);
        vec2 ndc = uv * 2.0 - 1.0;
        vec3 rd = getCameraMatrix() * normalize(vec3(ndc.x * fovScale * aspect, ndc.y * fovScale, 1.0));

        color = getSkyColor(rd);
        float hitDist;
        float hit = raymarchOcean(camPos, rd, hitDist);
        if (hit > 0.5) {
            vec3 p = camPos + rd * hitDist;
            color = shadeOcean(camPos, rd, p, hitDist);
        }
        color = tonemap(color);
        color = pow(color, vec3(1.0/2.2));
    }

    outColor = vec4(color, 1.0);
}
`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vertSrc));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fragSrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const noiseSize = 256;
const noiseData = new Uint8Array(noiseSize * noiseSize);
for (let i = 0; i < noiseData.length; i++) noiseData[i] = Math.random() * 255 | 0;
const noiseTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, noiseTex);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.R8, noiseSize, noiseSize, 0, gl.RED, gl.UNSIGNED_BYTE, noiseData);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

const loc = n => gl.getUniformLocation(prog, n);
gl.activeTexture(gl.TEXTURE0);
gl.bindTexture(gl.TEXTURE_2D, noiseTex);
gl.uniform1i(loc('uNoiseTexture'), 0);

const uTime = loc('uTime');
const uRes = loc('uResolution');
const start = performance.now();

function frame() {
  const w = canvas.width, h = canvas.height;
  gl.viewport(0, 0, w, h);
  gl.uniform2f(uRes, w, h);
  gl.uniform1f(uTime, (performance.now() - start) * 0.001);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
