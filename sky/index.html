<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky</title>
<script src="../nav.js?v=2" defer></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e4e0;
    font-family: 'Georgia', serif;
    color: #333;
    display: flex; flex-direction: column; align-items: center;
    padding: 50px 20px 40px;
  }
  .title { text-align: center; margin-bottom: 20px; }
  .title h1 { font-size: 1rem; font-weight: 600; }
  .title p { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .main-row { display: flex; gap: 24px; align-items: flex-start; }
  .wrap {
    position: relative;
    width: 280px; height: 605px;
    overflow: hidden; border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    flex-shrink: 0;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .paper {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    mix-blend-mode: color-burn;
    object-fit: cover;
    transition: opacity 0.3s;
  }
  .desc {
    width: 280px; margin-top: 20px;
    font-size: 0.8rem; line-height: 1.6; color: #666;
  }
  .desc strong { display: block; font-size: 0.75rem; margin-top: 12px; }

  /* Config Panel */
  .panel {
    width: 300px; max-height: 620px;
    overflow-y: auto; overflow-x: hidden;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 16px;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    font-size: 11px;
    color: #444;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
  .panel h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: #999; margin: 14px 0 8px; padding-top: 10px;
    border-top: 1px solid #f0f0f0;
  }
  .panel h3:first-child { border-top: none; margin-top: 0; padding-top: 0; }
  .section-head { display: flex; align-items: center; gap: 6px; }
  .section-head input[type="checkbox"] { accent-color: #666; margin: 0; cursor: pointer; }
  .section-body.disabled { opacity: 0.3; pointer-events: none; }
  .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .row label { width: 90px; flex-shrink: 0; color: #666; }
  .row input[type="range"] { flex: 1; height: 4px; accent-color: #666; }
  .row input[type="color"] { width: 28px; height: 22px; border: 1px solid #ddd; border-radius: 3px; padding: 0; cursor: pointer; }
  .row .val { width: 36px; text-align: right; font-size: 10px; color: #999; font-family: monospace; }
  .panel-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px solid #eee; }
  .btn {
    flex: 1; padding: 8px 0; border: none; border-radius: 5px;
    font-size: 11px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn-confirm { background: #333; color: #fff; }
  .btn-confirm:hover { background: #555; }
  .btn-reset { background: #f0f0f0; color: #666; }
  .btn-reset:hover { background: #e0e0e0; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 8px 20px; border-radius: 6px;
    font: 12px -apple-system, sans-serif; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 9999;
  }
  .toast.show { opacity: 1; }
  @media (max-width: 700px) {
    .main-row { flex-direction: column; align-items: center; }
    .panel { width: 280px; max-height: none; }
  }
</style>
</head>
<body>

<div class="title">
  <h1>Sky</h1>
  <p>Apr 2026</p>
</div>

<div class="main-row">
  <div>
    <div class="wrap">
      <canvas id="c"></canvas>
      <img class="paper" id="paper" src="canvas.png" alt="">
    </div>
    <div class="desc">
      <p>Dawn gradient with cotton wisps.</p>
      <strong>Dev Notes.</strong>
      <p>Procedural FBM clouds, Riso halftone, organic border.</p>
    </div>
  </div>

  <div class="panel" id="panel"></div>
</div>

<div class="toast" id="toast">Config saved</div>

<script>
/* ══════════════════════════════════
   DEFAULT CONFIG (source of truth)
   ══════════════════════════════════ */
const DEFAULTS = {
  gradTop:       '#ACCDEC',
  gradMid:       '#E7EBF4',
  gradMidPos:    0.6154,
  gradBottom:    '#FFDDB9',

  cloudDensity:  0.45,
  cloudSoft:     0.55,
  cloudSpeed:    0.008,
  cloudOpacity:  0.45,

  risoEnabled:   true,
  risoColor:     '#4D7A8C',
  dotSpacing:    1.0,
  dotRadius:     0.5,
  blurRadius:    80,
  blurAmount:    0.7,
  highlightColor:'#BFC8D1',

  borderEnabled:   true,
  borderRisoFade:  15,
  borderBlurFade:  15,
  borderBlurInset: 12,

  overlayOpacity: 1.0,
};

const STORAGE_KEY = 'sky-shader-config';
let cfg = { ...DEFAULTS };
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) try { Object.assign(cfg, JSON.parse(saved)); } catch(e) {}

/* ══════════════════════════════════
   CONFIG PANEL
   ══════════════════════════════════ */
function hexToRgb(h) {
  const r = parseInt(h.slice(1,3),16)/255;
  const g = parseInt(h.slice(3,5),16)/255;
  const b = parseInt(h.slice(5,7),16)/255;
  return [r, g, b];
}

const defs = [
  { section: 'Gradient' },
  { key: 'gradTop',    label: 'Top color',    type: 'color' },
  { key: 'gradMid',    label: 'Mid color',    type: 'color' },
  { key: 'gradMidPos', label: 'Mid position', type: 'range', min: 0.2, max: 0.9, step: 0.01 },
  { key: 'gradBottom', label: 'Bottom color', type: 'color' },

  { section: 'Clouds' },
  { key: 'cloudDensity',  label: 'Density',  type: 'range', min: 0, max: 1, step: 0.01 },
  { key: 'cloudSoft',     label: 'Softness', type: 'range', min: 0.1, max: 1, step: 0.01 },
  { key: 'cloudSpeed',    label: 'Speed',    type: 'range', min: 0, max: 0.03, step: 0.001 },
  { key: 'cloudOpacity',  label: 'Opacity',  type: 'range', min: 0, max: 1, step: 0.01 },

  { section: 'Riso Halftone', toggle: 'risoEnabled' },
  { key: 'risoColor',      label: 'Dot color',   type: 'color' },
  { key: 'dotSpacing',     label: 'Dot spacing',  type: 'range', min: 0.5, max: 3, step: 0.1 },
  { key: 'dotRadius',      label: 'Dot radius',   type: 'range', min: 0.1, max: 1.5, step: 0.05 },
  { key: 'blurRadius',     label: 'Blur radius',  type: 'range', min: 0, max: 200, step: 5 },
  { key: 'blurAmount',     label: 'Blur amount',  type: 'range', min: 0, max: 1, step: 0.05 },
  { key: 'highlightColor', label: 'Highlight',    type: 'color' },

  { section: 'Organic Border', toggle: 'borderEnabled' },
  { key: 'borderRisoFade',  label: 'Riso fade',  type: 'range', min: 0, max: 40, step: 1 },
  { key: 'borderBlurFade',  label: 'Blur fade',  type: 'range', min: 0, max: 40, step: 1 },
  { key: 'borderBlurInset', label: 'Blur inset', type: 'range', min: 0, max: 30, step: 1 },

  { section: 'Overlay' },
  { key: 'overlayOpacity', label: 'Halftone α', type: 'range', min: 0, max: 1, step: 0.05 },
];

const panel = document.getElementById('panel');
const inputs = {};
let currentBody = null;

defs.forEach(d => {
  if (d.section) {
    const h = document.createElement('h3');
    if (d.toggle) {
      const wrap = document.createElement('div');
      wrap.className = 'section-head';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = cfg[d.toggle];
      const label = document.createTextNode(d.section);
      wrap.appendChild(cb);
      wrap.appendChild(label);
      h.appendChild(wrap);

      const body = document.createElement('div');
      body.className = 'section-body' + (cfg[d.toggle] ? '' : ' disabled');
      currentBody = body;

      cb.addEventListener('change', () => {
        cfg[d.toggle] = cb.checked;
        body.classList.toggle('disabled', !cb.checked);
        applyConfig();
      });
      inputs[d.toggle] = cb;

      panel.appendChild(h);
      panel.appendChild(body);
    } else {
      h.textContent = d.section;
      panel.appendChild(h);
      currentBody = null;
    }
    return;
  }

  const row = document.createElement('div');
  row.className = 'row';
  const lbl = document.createElement('label');
  lbl.textContent = d.label;
  row.appendChild(lbl);

  const inp = document.createElement('input');
  inp.type = d.type;
  if (d.type === 'range') {
    inp.min = d.min; inp.max = d.max; inp.step = d.step;
    inp.value = cfg[d.key];
    const val = document.createElement('span');
    val.className = 'val';
    val.textContent = Number(cfg[d.key]).toFixed(d.step < 0.01 ? 3 : 2);
    inp.addEventListener('input', () => {
      cfg[d.key] = parseFloat(inp.value);
      val.textContent = Number(inp.value).toFixed(d.step < 0.01 ? 3 : 2);
      applyConfig();
    });
    row.appendChild(inp);
    row.appendChild(val);
  } else {
    inp.value = cfg[d.key];
    inp.addEventListener('input', () => {
      cfg[d.key] = inp.value;
      applyConfig();
    });
    row.appendChild(inp);
  }
  inputs[d.key] = inp;
  (currentBody || panel).appendChild(row);
});

const actions = document.createElement('div');
actions.className = 'panel-actions';
const btnConfirm = document.createElement('button');
btnConfirm.className = 'btn btn-confirm';
btnConfirm.textContent = 'Confirm & Save';
btnConfirm.onclick = () => {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  showToast('Config saved');
};
const btnReset = document.createElement('button');
btnReset.className = 'btn btn-reset';
btnReset.textContent = 'Reset';
btnReset.onclick = () => {
  Object.assign(cfg, DEFAULTS);
  localStorage.removeItem(STORAGE_KEY);
  defs.forEach(d => {
    if (!d.key) return;
    const inp = inputs[d.key];
    if (!inp) return;
    inp.value = cfg[d.key];
    const val = inp.parentElement.querySelector('.val');
    if (val) val.textContent = Number(cfg[d.key]).toFixed(2);
  });
  if (inputs.risoEnabled) {
    inputs.risoEnabled.checked = cfg.risoEnabled;
    inputs.risoEnabled.dispatchEvent(new Event('change'));
  }
  if (inputs.borderEnabled) {
    inputs.borderEnabled.checked = cfg.borderEnabled;
    inputs.borderEnabled.dispatchEvent(new Event('change'));
  }
  applyConfig();
  showToast('Reset to defaults');
};
actions.appendChild(btnConfirm);
actions.appendChild(btnReset);
panel.appendChild(actions);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

/* ══════════════════════════════════
   SHADERS
   ══════════════════════════════════ */
const CW = 280, CH = 605;
const canvas = document.getElementById('c');
const dpr = Math.min(window.devicePixelRatio, 2);
canvas.width = CW * dpr;
canvas.height = CH * dpr;
const gl = canvas.getContext('webgl2');
if (!gl) { document.body.innerHTML = '<p>WebGL2 required</p>'; throw ''; }

const quadVert = `#version 300 es
precision highp float;
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const skyFrag = `#version 300 es
precision highp float;
out vec4 outColor;
uniform float uTime;
uniform vec2 uResolution;
uniform vec3 uGradTop, uGradMid, uGradBottom;
uniform float uGradMidPos;
uniform float uCloudDensity, uCloudSoft, uCloudSpeed, uCloudOpacity;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
    float v = 0.0, a = 0.5;
    mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
    for (int i = 0; i < 6; i++) { v += a * noise(p); p = rot * p * 2.0 + vec2(1.7, 9.2); a *= 0.5; }
    return v;
}
float cloudLayer(vec2 uv, vec2 scale, float speed, float yCenter, float ySpread) {
    return fbm(uv * scale + vec2(uTime * speed, 0.0)) * (1.0 - smoothstep(0.0, ySpread, abs(uv.y - yCenter)));
}

void main() {
    vec2 uv = gl_FragCoord.xy / uResolution;
    float t = 1.0 - uv.y;
    vec3 sky = t < uGradMidPos
        ? mix(uGradTop, uGradMid, t / uGradMidPos)
        : mix(uGradMid, uGradBottom, (t - uGradMidPos) / (1.0 - uGradMidPos));

    float c1 = cloudLayer(uv, vec2(3.0, 1.5), uCloudSpeed, 0.65, 0.35);
    float c2 = cloudLayer(uv, vec2(5.0, 2.5), uCloudSpeed * 1.5, 0.55, 0.30);
    float c3 = cloudLayer(uv, vec2(8.0, 4.0), uCloudSpeed * 0.6, 0.72, 0.25);
    float c4 = cloudLayer(uv, vec2(2.0, 1.0), uCloudSpeed * 0.4, 0.45, 0.40);
    float clouds = c1 * 0.35 + c2 * 0.25 + c3 * 0.2 + c4 * 0.2;
    clouds = smoothstep(0.5 - uCloudDensity * 0.4, 0.5 + uCloudSoft * 0.3, clouds);

    vec3 cc = sky + vec3(0.10, 0.08, 0.06);
    sky = mix(sky, min(cc, vec3(1.0)), clouds * uCloudOpacity);

    float glow = exp(-pow((uv.y - 0.35) * 3.0, 2.0)) * 0.06;
    sky += vec3(1.0, 0.95, 0.88) * glow;

    outColor = vec4(sky, 1.0);
}
`;

function frame() {
  const t = (performance.now() - t0) * 0.001;

  gl.useProgram(skyP);
  gl.bindFramebuffer(gl.FRAMEBUFFER, skyFBO.fbo);
  gl.viewport(0, 0, W, H);
  gl.uniform1f(skL('uTime'), t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  gl.useProgram(risoP);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, skyFBO.tex);
  gl.uniform1i(rL('inputBuffer'), 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  requestAnimationFrame(frame);
}
frame();
</script>
