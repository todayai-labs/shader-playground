<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0a0c; }
  body {

  }
  .wrap {

const CH = wrap.clientHeight;

canvas.height = CH * dpr;
const gl = canvas.getContext('webgl2');
if (!gl) { document.body.innerHTML = '<p>WebGL2 required</p>'; throw ''; }

const CONFIG = {

  waveScale: 0.08,
  waveSpeed: 0.06,
  oceanRadius: 400,
  sunAzimuth: -2.8,
  sunElevation: 0.85,
  sunColor: [1.0, 0.902, 0.8],
  sunStrength: 3.0,
  surfaceColor: [0.184, 0.373, 0.42],
  depthColor: [0.286, 0.431, 0.529],
  scatterColor: [0.49, 0.859, 0.792],
  cameraPos: [-2.22, 20.84, 11.94],
  lookAt: [-3.68, 7.85, -4.34],
  fov: 60,
};

const SPARKLE_CONFIG = {
  cellSearchRadius: 4,
  cellSize: 20.0,
  fadeIn: 0.55,
  fadeOut: 0.82,
  maxShowDuration: 0.8,
  hideDuration: 0.2,
  coreColor: [1.0, 1.0, 1.0],

const quadVert = `#version 300 es
precision highp float;
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const oceanFrag = `#version 300 es
precision highp float;
out vec4 outColor;
uniform float uTime;
uniform vec2 uResolution;
uniform vec3 uCameraPos;
uniform mat4 uProjectionMatrixInverse;
uniform mat4 uViewMatrixInverse;
uniform float uWaveHeight;
uniform float uWaveScale;
uniform float uWaveSpeed;
uniform vec3 uSunDirection;
uniform vec3 uSurfaceColor;
uniform vec3 uScatterColor;
uniform sampler2D uNoiseTexture;
uniform float uOceanRadius;
uniform vec3 uSunColor;
uniform float uSunStrength;
uniform vec3 uDepthColor;

float noise(vec2 p) {
    vec2 i = floor(p); vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    float a = texture(uNoiseTexture, (i + vec2(0.5, 0.5)) * 0.00390625).r;
    float b = texture(uNoiseTexture, (i + vec2(1.5, 0.5)) * 0.00390625).r;
    float c = texture(uNoiseTexture, (i + vec2(0.5, 1.5)) * 0.00390625).r;
    float d = texture(uNoiseTexture, (i + vec2(1.5, 1.5)) * 0.00390625).r;
    return a + (b - a) * u.x + (c - a) * u.y + (a - b - c + d) * u.x * u.y - 0.5;
}
const float angle = 3.14;
const float sA = sin(angle), cA = cos(angle);
const mat2 octaveRotation = mat2(cA, sA, -sA, cA);

float fbm(vec3 pos, int limit) {
    float res = 0.0, freq = 1.0, amp = 1.0;
    for (int i = 0; i < 9; i++) {
        if (i >= limit) break;
        res += noise(freq * (pos.xz + uTime * (uWaveSpeed * float(9 - i + 1)))) * amp;
        freq *= 1.75; amp *= 0.5; pos.xz *= octaveRotation;
    }
    return res;
}
float oceanHeight(vec2 xz, int oct) {
    float r = uWaveHeight * fbm(vec3(xz.x, 0.0, xz.y) * uWaveScale, oct);
    return mix(-100.0, r, 1.0 - smoothstep(uOceanRadius * 0.7, uOceanRadius, length(xz)));
}
vec3 getSkyColor(vec3 rd) {
    float t = max(rd.y, 0.0);
    vec3 sky = mix(vec3(1), mix(vec3(0.35,0.55,0.82), vec3(0.1,0.2,0.45), smoothstep(0.0,0.8,t)), smoothstep(-0.02,0.15,rd.y));
    float sd = max(dot(rd, uSunDirection), 0.0);
    sky += uSunColor * pow(sd, 256.0) * 2.0 + uSunColor * pow(sd, 8.0) * 0.3;
    return sky;
}
float approxHit(vec3 ro, vec3 rd, float lo, float hi) {
    for (int j = 0; j < 6; j++) { float m=0.5*(lo+hi); if((ro+rd*m).y - oceanHeight((ro+rd*m).xz,3)<0.0) hi=m; else lo=m; }
    return 0.5*(lo+hi);
}
void main() {
    vec2 ndc = (gl_FragCoord.xy / uResolution) * 2.0 - 1.0;
    vec4 vs = uProjectionMatrixInverse * vec4(ndc, 1.0, 1.0);
    vec3 rd = normalize((uViewMatrixInverse * vec4(vs.xy, -1.0, 0.0)).xyz);
    vec3 color = getSkyColor(rd);
    if (rd.y < 0.0) {
        float ceil = uWaveHeight*1.1, hd = 0.0, ss = 0.0;
        if (uCameraPos.y > ceil) hd = (ceil - uCameraPos.y)/rd.y;
        for (int i = 0; i < 24; i++) {
            vec3 p = uCameraPos + rd*hd;
            float df = p.y - oceanHeight(p.xz, 3);
            if (df < 0.01) { hd = approxHit(uCameraPos, rd, hd-ss, hd); break; }
            ss = max(df*0.5, 0.1+hd*0.01); hd += ss;
            if (hd > 1200.0) { hd = 1e6; break; }
        }
        if (hd < 1e5) {
            vec3 p = uCameraPos + rd*hd;
            float eps = (0.05/uResolution.y)*pow(hd, 1.55);
            float dx = oceanHeight(p.xz-vec2(eps,0),7) - oceanHeight(p.xz+vec2(eps,0),7);
            float dz = oceanHeight(p.xz-vec2(0,eps),7) - oceanHeight(p.xz+vec2(0,eps),7);
            vec3 n = normalize(vec3(dx, 2.0*eps, dz));
            vec3 vd = -rd;
            float fr = 0.02 + 0.98*pow(1.0-max(dot(n,vd),0.0), 5.0);
            vec3 refl = getSkyColor(reflect(rd, n));
            float cr = clamp(p.y/uWaveHeight+0.5, 0.0, 1.0);
            vec3 wc = mix(uDepthColor, uSurfaceColor, cr);
            vec3 amb = wc*0.3, dif = wc*max(dot(n,uSunDirection),0.0)*0.7;
            float sp = pow(max(dot(n, normalize(uSunDirection+vd)), 0.0), 256.0);
            vec3 spec = uSunColor*sp*uSunStrength;
            vec3 bl = normalize(-uSunDirection+n*0.3);
            vec3 sss = uScatterColor*pow(max(dot(vd,bl),0.0),4.0)*1.1*cr;
            color = mix(amb+dif+sss, refl, fr) + spec;
        }
    }
    color = clamp((color*(2.51*color+0.03))/(color*(2.43*color+0.59)+0.14), 0.0, 1.0);
    outColor = vec4(pow(color, vec3(1.0/2.2)), 1.0);
}
`;

const sparkleMaskFrag = `#version 300 es
precision highp float;
out vec4 outColor;
uniform float time; uniform vec2 resolution;
uniform sampler2D inputBuffer; uniform sampler2D prevBuffer;
uniform float fadeOut, fadeIn, maxShowDuration, hideDuration, seed;
uniform vec2 contentPadding;
#define TAU 6.2831853

struct SC { float sd,fif,fof,cs,cb,cgb,cgs,wa; vec2 scr; float sgb; vec2 slr; float saj; vec2 sor,cgor; };
const int CSR=4; const float cSz=20.0;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float n1d(float t,float pd){float i=floor(t),f=fract(t);f=f*f*(3.0-2.0*f);return mix(hash(vec2(mod(i,pd),0.0)),hash(vec2(mod(i+1.0,pd),0.0)),f);}
float bsn(vec2 p){float a=atan(p.y,p.x)+3.14159;float t=a/TAU;return(0.65*n1d(t*12.0+seed,12.0)+0.35*n1d(t*23.0+seed*3.7,23.0)-0.45)*4.0;}
float bd(vec2 p,vec2 c,vec2 hs){float cr=15.0;vec2 ed=abs(p-c)-hs+cr;return length(max(ed,0.0))+min(max(ed.x,ed.y),0.0)-cr+bsn(p-c);}
float getLuma(vec3 c){return dot(c,vec3(0.299,0.587,0.114));}
float sThresh(float l){return pow(smoothstep(0.7,1.0,l),2.0)*0.4;}
float bRad(float l,vec2 px){return step(0.9,l)*cSz*2.5*mix(1.0,0.8,px.y/resolution.y);}

int getSp(float s,float l){
    float w0=mix(0.1,0.6,l),w1=mix(0.2,0.3,l),w2=mix(0.3,0.1,l),w3=mix(0.0,0.5,l),w4=mix(2.0,0.0,l);
    float r=s*(w0+w1+w2+w3+w4);
    if(r<w0)return 0;if(r<w0+w1)return 1;if(r<w0+w1+w2)return 2;if(r<w0+w1+w2+w3)return 3;return 4;
}
SC getCfg(int sp){
    SC c;c.sd=1.0;c.fif=0.1;c.fof=0.8;c.cs=0.6;c.cb=0.6;c.cgb=20.0;c.cgs=0.65;c.wa=0.2;
    c.scr=vec2(4,4);c.sgb=17.0;c.slr=vec2(3,4);c.saj=0.05;c.sor=vec2(0.8,1);c.cgor=vec2(-2,0);
    if(sp==1){c.sd=0.8;c.fif=0.2;c.fof=0.2;c.cs=0.5;c.cb=0.7;c.cgs=0.95;c.wa=0.5;c.scr=vec2(5,9);c.sgb=0.3;c.slr=vec2(5.5,6);c.saj=0.9;c.sor=vec2(0.2,0.7);}
    if(sp==2){c.sd=0.2;c.fif=0.5;c.fof=0.2;c.cs=0.5;c.cgs=0.55;c.wa=0.5;c.scr=vec2(0,3);c.sgb=5.0;c.slr=vec2(1,1.5);c.saj=0.5;c.sor=vec2(0.8,0.9);c.cgor=vec2(-2,2);}
    if(sp==3){c.sd=0.2;c.fif=0.5;c.fof=0.2;c.cs=0.3;c.cb=2.0;c.cgs=0.55;c.wa=0.3;c.scr=vec2(0,4);c.sgb=5.0;c.slr=vec2(0.5,1);c.saj=0.0;c.sor=vec2(0.3,0.5);c.cgor=vec2(-1,1);}
    if(sp==4){c.sd=1.5;c.fif=0.3;c.fof=0.7;c.cs=0.9;c.cb=1.0;c.cgb=0.0;c.cgs=0.0;c.wa=0.1;c.scr=vec2(0,0);c.sgb=10.0;c.slr=vec2(2,4);c.saj=0.1;c.cgor=vec2(-2,0);}
    return c;
}
float swFn(float t,float l,int sp){float tp=mix(6.0,50.0,clamp((l-3.0)/6.0,0.0,1.0));if(sp==1)return 2.0*pow(1.0-t,mix(6.0,30.0,clamp((l-3.0)/4.0,0.0,1.0)));return(sp<3?1.0:2.0)*pow(1.0-t,tp);}
float soFn(float t,int sp){if(sp==2||sp==3)return 0.0;if(sp==1)return 1.0;if(sp==0)return 1.3-t;return 1.0;}
float sgoFn(float t,int sp){return(sp==1)?0.9-t:((sp<2)?0.9-t:1.0-t);}

vec3 sparkleShape(vec2 px,vec2 cc,float rad,float ct,float ssa,SC cfg,int sp){
    vec2 ctr=(cc+0.5)*cSz,tp=px-ctr;
    float pd=length(tp),pa=atan(tp.y,tp.x);
    float h1=hash(cc+vec2(7,3)),h2=hash(cc+vec2(5,11));
    float wb=1.0+cfg.wa*0.2*sin(pa*2.0+time*0.3+h1*TAU)+cfg.wa*0.1*sin(pa*3.0+time*0.2+h2*TAU);
    float feI=cfg.fif>0.0?smoothstep(0.0,cfg.sd*cfg.fif,ct):1.0;
    float fOS=max(cfg.sd*(1.0-cfg.fof),cfg.sd*cfg.fif);
    float feO=fOS<cfg.sd?1.0-smoothstep(fOS,cfg.sd,ct):1.0;
    float fe=feI*feO;
    float cd=(pd/wb)/max(rad*cfg.cs,1.0),cdc=clamp(cd,0.0,1.0);
    float core=(1.0-smoothstep(0.85*(1.0-cfg.cb),0.85,cdc))*fe;
    float ce=max(rad*cfg.cs,1.0)*wb*0.45;
    float goy=mix(cfg.cgor.x,cfg.cgor.y,hash(cc+vec2(31,47)));
    float gpd=length(tp-vec2(0,goy)),gd=max(gpd-ce,0.0),ga=0.0;
    if(cfg.cgb>0.0){float gf=1.0-clamp(gd/cfg.cgb,0.0,1.0);ga=gf*gf*cfg.cgs*fe;}
    float sc=floor(mix(cfg.scr.x,cfg.scr.y+1.0,h1));sc=clamp(sc,cfg.scr.x,cfg.scr.y);
    if(sc==0.0)return vec3(core,0,ga)*fe;
    float gr=1.0-pow(1.0-clamp(ct/(cfg.sd*0.4),0.0,1.0),3.0);
    float bs=TAU/sc,sr=-TAU/14.0*(0.5+0.5*sin(time*0.3));
    float ai=floor((pa-sr)/bs+0.5),ba=TAU,sl=0.0,so=1.0;
    for(float o=-1.0;o<=1.0;o+=1.0){float i=mod(ai+o,sc);float j=(hash(cc+vec2(i*5.17,i*3.31))-0.5)*bs*cfg.saj;float sa=sr+i*bs+j;float ad=abs(mod(pa-sa+3.14159,TAU)-3.14159);if(ad<ba){ba=ad;sl=mix(cfg.slr.x,cfg.slr.y,hash(cc+vec2(i*7.13,i*11.97)))*gr;float da=abs(mod(sa-sr+3.14159,TAU)-3.14159);if(da<0.2)sl*=ssa;so=mix(cfg.sor.x,cfg.sor.y,hash(cc+vec2(i*13.37,i*17.53)));}}
    float sd=cd/sl,sdc=clamp(sd,0.0,1.0),sm=step(sd,1.0);
    float sw=swFn(sd,sl,sp);
    float strk=smoothstep(sw,sw*0.15,ba)*soFn(sdc,sp)*sm*so*fe;
    float sgd=sin(max(ba-sw,0.0))*pd;
    float sgl=(1.0-clamp(sgd/cfg.sgb,0.0,1.0))*sgoFn(sdc,sp)*sm*so*fe;
    return vec3(core,max(strk,sgl),ga)*fe;
}

void main(){
    vec2 px=gl_FragCoord.xy,uv=px/resolution;
    vec4 cs=texture(inputBuffer,uv);
    if(cs.a<0.01){outColor=vec4(0);return;}
    vec2 cell=floor(px/cSz);
    float ssa=1.0+0.6*pow(max(sin(time*TAU/2.0),0.0),2.0);
    float mr=cSz*2.5,msl=max(5.0*ssa,2.0),mrc=mr*max(msl,1.0)+mr*0.5;
    int sr=min(int(ceil(mrc/cSz))+1,CSR);mrc*=mrc;
    vec2 cMin=contentPadding*resolution,cMax=(1.0-contentPadding)*resolution;
    vec2 bc=(cMin+cMax)*0.5,bhs=(cMax-cMin)*0.5;
    vec4 maxM=vec4(0);
    for(int dx=-CSR;dx<=CSR;dx++){if(dx<-sr||dx>sr)continue;for(int dy=-CSR;dy<=CSR;dy++){if(dy<-sr||dy>sr)continue;
        vec2 cc=cell+vec2(float(dx),float(dy)),ctr=(cc+0.5)*cSz;
        if(bd(ctr,bc,bhs)>0.0)continue;
        vec2 tp=px-ctr;if(dot(tp,tp)>mrc)continue;
        float cl=getLuma(texture(inputBuffer,ctr/resolution).rgb);
        float po=hash(cc+vec2(42,13)),cd2=(maxShowDuration+hideDuration)*mix(0.8,1.2,hash(cc+vec2(77,31)));
        float lt=time+po*cd2,ci=floor(lt/cd2),ct=mod(lt,cd2);
        float ss=hash(cc+vec2(ci*3.14,ci*1.41));int sp=getSp(ss,cl);SC cfg=getCfg(sp);
        if(hash(cc+vec2(ci*1.731,ci*2.399))>=sThresh(cl))continue;
        float rad=bRad(cl,ctr)*mix(0.9,1.1,hash(cc+vec2(123,456)));if(rad<0.5)continue;
        float rch=rad*max(msl,1.0)+rad*0.5;rch*=rch;if(dot(tp,tp)>rch)continue;
        vec3 m=sparkleShape(px,cc,rad,ct,ssa,cfg,sp);
        float ic=(sp==4)?1.0:0.0;if(m.r>maxM.r)maxM.a=ic;
        maxM.rgb=max(maxM.rgb,m);
    }}
    vec4 prev=texture(prevBuffer,uv)*fadeOut;
    outColor=vec4(max(prev.rgb,maxM.rgb),(maxM.r>prev.r)?maxM.a:prev.a);
}
`;

const compositeFrag = `#version 300 es
precision highp float;
out vec4 outColor;
uniform sampler2D inputBuffer, sparkleMask;
uniform vec3 coreColor, secondaryCoreColor, coreGlowColor, streakColor;
uniform vec2 uResolution;
vec3 hl(vec3 b,vec3 bl){return mix(2.0*b*bl,1.0-2.0*(1.0-b)*(1.0-bl),step(0.5,bl));}
void main(){
    vec2 uv=gl_FragCoord.xy/uResolution;
    vec4 inp=texture(inputBuffer,uv);
    vec4 mv=texture(sparkleMask,uv);
    vec3 b=inp.rgb;
    vec3 cc=mix(coreColor,secondaryCoreColor,mv.a);
    vec3 wc=mix(b,hl(b,cc),mv.r);
    vec3 wg=mix(wc,hl(wc,coreGlowColor),mv.b*(1.0-mv.r));
    outColor=vec4(mix(wg,hl(wg,streakColor),mv.g),inp.a);
}
`;

const risoFrag = `#version 300 es
precision highp float;
out vec4 outColor;
uniform sampler2D inputBuffer;
uniform vec2 resolution;
uniform vec3 color,highlightColor,bgColor;

function persp(fov,asp,n,f){const ff=1/Math.tan(fov*Math.PI/360),nf=1/(n-f);return new Float32Array([ff/asp,0,0,0,0,ff,0,0,0,0,(f+n)*nf,-1,0,0,2*f*n*nf,0]);}
function lookAt(e,t,u){const z=norm3(sub3(e,t)),x=norm3(cross3(u,z)),y=cross3(z,x);return new Float32Array([x[0],y[0],z[0],0,x[1],y[1],z[1],0,x[2],y[2],z[2],0,-dot3(x,e),-dot3(y,e),-dot3(z,e),1]);}
function inv4(m){const inv=new Float32Array(16),m00=m[0],m01=m[1],m02=m[2],m03=m[3],m10=m[4],m11=m[5],m12=m[6],m13=m[7],m20=m[8],m21=m[9],m22=m[10],m23=m[11],m30=m[12],m31=m[13],m32=m[14],m33=m[15],b00=m00*m11-m01*m10,b01=m00*m12-m02*m10,b02=m00*m13-m03*m10,b03=m01*m12-m02*m11,b04=m01*m13-m03*m11,b05=m02*m13-m03*m12,b06=m20*m31-m21*m30,b07=m20*m32-m22*m30,b08=m20*m33-m23*m30,b09=m21*m32-m22*m31,b10=m21*m33-m23*m31,b11=m22*m33-m23*m32;let d=b00*b11-b01*b10+b02*b09+b03*b08-b04*b07+b05*b06;if(!d)return inv;d=1/d;inv[0]=(m11*b11-m12*b10+m13*b09)*d;inv[1]=(m02*b10-m01*b11-m03*b09)*d;inv[2]=(m31*b05-m32*b04+m33*b03)*d;inv[3]=(m22*b04-m21*b05-m23*b03)*d;inv[4]=(m12*b08-m10*b11-m13*b07)*d;inv[5]=(m00*b11-m02*b08+m03*b07)*d;inv[6]=(m32*b02-m30*b05-m33*b01)*d;inv[7]=(m20*b05-m22*b02+m23*b01)*d;inv[8]=(m10*b10-m11*b08+m13*b06)*d;inv[9]=(m01*b08-m00*b10-m03*b06)*d;inv[10]=(m30*b04-m31*b02+m33*b00)*d;inv[11]=(m21*b02-m20*b04-m23*b00)*d;inv[12]=(m11*b07-m10*b09-m12*b06)*d;inv[13]=(m00*b09-m01*b07+m02*b06)*d;inv[14]=(m31*b01-m30*b03-m32*b00)*d;inv[15]=(m20*b03-m21*b01+m22*b00)*d;return inv;}

const asp=CW/CH;
const pM=persp(CONFIG.fov,asp,0.1,1000),vM=lookAt(CONFIG.cameraPos,CONFIG.lookAt,[0,1,0]);
const pI=inv4(pM),vI=inv4(vM);
const sD=norm3([Math.cos(CONFIG.sunElevation)*Math.sin(CONFIG.sunAzimuth),Math.sin(CONFIG.sunElevation),Math.cos(CONFIG.sunElevation)*Math.cos(CONFIG.sunAzimuth)]);

gl.useProgram(oP);bQ(oP);const oL=n=>gl.getUniformLocation(oP,n);
gl.uniform2f(oL('uResolution'),W,H);gl.uniform3fv(oL('uCameraPos'),CONFIG.cameraPos);
gl.uniformMatrix4fv(oL('uProjectionMatrixInverse'),false,pI);gl.uniformMatrix4fv(oL('uViewMatrixInverse'),false,vI);
gl.uniform1f(oL('uWaveHeight'),CONFIG.waveHeight);gl.uniform1f(oL('uWaveScale'),CONFIG.waveScale);
gl.uniform1f(oL('uWaveSpeed'),CONFIG.waveSpeed);gl.uniform3fv(oL('uSunDirection'),sD);
gl.uniform3fv(oL('uSurfaceColor'),CONFIG.surfaceColor);gl.uniform3fv(oL('uScatterColor'),CONFIG.scatterColor);
gl.uniform1f(oL('uOceanRadius'),CONFIG.oceanRadius);gl.uniform3fv(oL('uSunColor'),CONFIG.sunColor);
gl.uniform1f(oL('uSunStrength'),CONFIG.sunStrength);gl.uniform3fv(oL('uDepthColor'),CONFIG.depthColor);

gl.useProgram(sP);bQ(sP);const sL=n=>gl.getUniformLocation(sP,n);
gl.uniform2f(sL('resolution'),W,H);gl.uniform1f(sL('fadeOut'),SPARKLE_CONFIG.fadeOut);
gl.uniform1f(sL('fadeIn'),SPARKLE_CONFIG.fadeIn);gl.uniform1f(sL('maxShowDuration'),SPARKLE_CONFIG.maxShowDuration);
gl.uniform1f(sL('hideDuration'),SPARKLE_CONFIG.hideDuration);
gl.uniform2f(sL('contentPadding'),5/W,5/H);gl.uniform1f(sL('seed'),Math.random());

gl.useProgram(cP);bQ(cP);const cL=n=>gl.getUniformLocation(cP,n);
gl.uniform2f(cL('uResolution'),W,H);gl.uniform3fv(cL('coreColor'),SPARKLE_CONFIG.coreColor);
gl.uniform3fv(cL('secondaryCoreColor'),SPARKLE_CONFIG.secondaryCoreColor);
gl.uniform3fv(cL('coreGlowColor'),SPARKLE_CONFIG.coreGlowColor);
gl.uniform3fv(cL('streakColor'),SPARKLE_CONFIG.streakColor);

gl.useProgram(rP);bQ(rP);const rL=n=>gl.getUniformLocation(rP,n);
gl.uniform2f(rL('resolution'),W,H);gl.uniform3fv(rL('color'),RISO_CONFIG.color);
gl.uniform1f(rL('dotSpacing'),RISO_CONFIG.dotSpacing);gl.uniform1f(rL('dotRadius'),RISO_CONFIG.dotRadius);
gl.uniform1f(rL('blurRadius'),RISO_CONFIG.blurRadius*(H/1080));
gl.uniform1f(rL('blurAmount'),RISO_CONFIG.blurAmount);gl.uniform3fv(rL('highlightColor'),RISO_CONFIG.highlightColor);
gl.uniform3fv(rL('bgColor'),RISO_CONFIG.bgColor);gl.uniform1f(rL('borderRisoFade'),RISO_CONFIG.borderRisoFade);
gl.uniform1f(rL('borderBlurFade'),RISO_CONFIG.borderBlurFade);gl.uniform1f(rL('borderBlurInset'),RISO_CONFIG.borderBlurInset);
gl.uniform1f(rL('seed'),Math.random());

const t0=performance.now();
const oTime=gl.getUniformLocation(oP,'uTime'),sTime=gl.getUniformLocation(sP,'time');

function frame(){
  const t=(performance.now()-t0)*0.001;
  gl.useProgram(oP);gl.bindFramebuffer(gl.FRAMEBUFFER,oFBO.fbo);gl.viewport(0,0,W,H);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,nT);gl.uniform1i(oL('uNoiseTexture'),0);gl.uniform1f(oTime,t);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  const rM=mSwap?mB:mA,wM=mSwap?mA:mB;
  gl.useProgram(sP);gl.bindFramebuffer(gl.FRAMEBUFFER,wM.fbo);gl.viewport(0,0,W,H);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,oFBO.tex);gl.uniform1i(sL('inputBuffer'),0);
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,rM.tex);gl.uniform1i(sL('prevBuffer'),1);
  gl.uniform1f(sTime,t);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);mSwap=!mSwap;

  gl.useProgram(rP);gl.bindFramebuffer(gl.FRAMEBUFFER,rFBO.fbo);gl.viewport(0,0,W,H);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,oFBO.tex);gl.uniform1i(rL('inputBuffer'),0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  gl.useProgram(cP);gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,W,H);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,rFBO.tex);gl.uniform1i(cL('inputBuffer'),0);
  gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,wM.tex);gl.uniform1i(cL('sparkleMask'),1);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(frame);
}
frame();
</script>
