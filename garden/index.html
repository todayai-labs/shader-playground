<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Garden</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0c;
            font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
            color: #fff;
        }
        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px 40px;
        }
        .canvas {
            aspect-ratio: 1.341;
            width: 540px;
            margin: auto;
            display: flex;
            position: relative;
        }
        .scene {
            aspect-ratio: 1.341;
            width: calc(100% - 5px);
            margin: auto;
            display: flex;
        }
        .scene canvas {
            border-radius: 2px;
            width: 100% !important;
            height: 100% !important;
        }
        .grass {
            pointer-events: none;
            mix-blend-mode: screen;
            background: url(textures/grass.webp) center/cover no-repeat;
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
        }
        .cover {
            pointer-events: none;
            mix-blend-mode: darken;
            background: url(textures/cover.png) center/cover no-repeat;
            outline: 30px solid #0a0a0c;
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
        }
        @media screen and (max-width: 580px) {
            .canvas { width: 300px; height: 350px; }
        }
    </style>
<script src="../nav.js?v=2" defer></script>
</head>
<body>
    <div class="page">
        <div class="canvas">
            <div class="scene" id="scene-container"></div>
            <div class="grass" aria-hidden="true"></div>
            <div class="cover" aria-hidden="true"></div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
