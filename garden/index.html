<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Garden</title>
    <script>
    (function () {
      /* ?embed=… is stripped when static servers redirect /garden/index.html → /garden — use #embed in iframes */
      var q = new URLSearchParams(location.search);
      var hashOk = location.hash && /embed/i.test(location.hash);
      if (q.has('embed') || hashOk) {
        document.documentElement.classList.add('garden-embed');
      }
    })();
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0c;
            font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
            color: #fff;
        }
        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px 40px;
        }
        .canvas {
            aspect-ratio: 1.341;
            width: 540px;
            margin: auto;
            display: flex;
            position: relative;
        }
        .scene {
            aspect-ratio: 1.341;
            width: calc(100% - 5px);
            margin: auto;
            display: flex;
        }
        .scene canvas {
            border-radius: 2px;
            width: 100% !important;
            height: 100% !important;
        }
        .grass {
            pointer-events: none;
            mix-blend-mode: screen;
            background: url(/garden/textures/grass.webp) center/cover no-repeat;
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
        }
        .cover {
            pointer-events: none;
            mix-blend-mode: darken;
            background: url(/garden/textures/cover.png) center/cover no-repeat;
            outline: 30px solid #0a0a0c;
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
        }
        @media screen and (max-width: 580px) {
            html:not(.garden-embed) .canvas { width: 300px; height: 350px; }
        }

        /* Full-viewport embed (e.g. waitlist background) */
        html.garden-embed {
            width: 100%;
            height: 100%;
            min-height: 100%;
            overflow: hidden;
            background: #E0D0B8;
        }
        html.garden-embed body {
            width: 100%;
            height: 100%;
            min-height: 100%;
            margin: 0;
            overflow: hidden;
            background: #E0D0B8;
        }
        html.garden-embed .page {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            min-height: 100%;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }
        /*
         * Fill iframe edge-to-edge: absolute .scene avoids flex min-height quirks;
         * grass/cover use negative inset + larger bg so texture reads fuller under blend modes.
         */
        html.garden-embed .canvas {
            flex: 1 1 auto;
            width: 100% !important;
            max-width: none !important;
            height: 100% !important;
            min-height: 0;
            aspect-ratio: unset !important;
            margin: 0 !important;
            display: block;
            position: relative;
            overflow: hidden;
        }
        html.garden-embed .scene {
            position: absolute;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            min-height: 0;
            aspect-ratio: unset !important;
            margin: 0 !important;
        }
        html.garden-embed .scene canvas {
            border-radius: 0;
        }
        html.garden-embed .cover {
            outline: none;
            top: -8%;
            bottom: -8%;
            left: -8%;
            right: -8%;
            background-size: 118% 118%;
            background-position: 50% 58%;
        }
        html.garden-embed .grass {
            top: -10%;
            bottom: -10%;
            left: -8%;
            right: -8%;
            background-size: 125% 125%;
            background-position: 50% 68%;
        }
    </style>
<script src="/nav.js?v=2" defer></script>
</head>
<body>
    <div class="page">
        <div class="canvas">
            <div class="scene" id="scene-container"></div>
            <div class="grass" aria-hidden="true"></div>
            <div class="cover" aria-hidden="true"></div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="/garden/js/main.js"></script>
</body>
</html>
