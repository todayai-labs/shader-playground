<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waitlist — Shader Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courgette&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=sentient@400,500,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1c1c1a;
      background: #E0D0B8;
      overflow-x: hidden;
    }

    input[type="email"],
    input[type="text"] {
      cursor: text;
    }

    .bg-stack {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: 100svh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    /* Overscan hides iframe letterboxing, URL-bar jitter, and sub-pixel gaps */
    .garden-bg {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 112%;
      height: 112%;
      min-width: 100%;
      min-height: 100%;
      max-width: none;
      border: 0;
      outline: 0;
      display: block;
      transform: translate(-50%, -50%);
    }
    /* Soft center lift so type + glass read on busy ground */
    .bg-veil {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 88% 78% at 50% 40%,
        rgba(252, 250, 245, 0.52) 0%,
        rgba(252, 250, 245, 0.18) 48%,
        transparent 70%);
    }

    .top-link {
      position: fixed;
      top: 18px;
      left: 20px;
      z-index: 10;
      font-size: 13px;
      font-weight: 500;
      color: rgba(28, 28, 26, 0.45);
      text-decoration: none;
      transition: color 0.2s;
    }
    .top-link:hover { color: rgba(28, 28, 26, 0.85); }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 96px 24px 64px;
    }

    .content {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(28, 28, 26, 0.72);
      border: 1px solid #fff;
      background: linear-gradient(91deg, #fff 5.07%, #dee0e4 99.47%);
      box-shadow:
        0 4px 10px 0 rgba(0, 0, 0, 0.1),
        1.5px 1.5px 3px 0 rgba(0, 0, 0, 0.18) inset;
      margin-bottom: 28px;
    }

    h1 {
      font-family: 'Sentient', Georgia, 'Times New Roman', serif;
      font-size: 100px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.12;
      margin-bottom: 20px;
      color: #161614;
    }
    h1 .h1-courgette {
      font-family: 'Courgette', cursive;
      font-style: normal;
      font-weight: 400;
    }
    .lead {
      font-family: 'Sentient', Georgia, 'Times New Roman', serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.65;
      color: rgba(0, 0, 0, 0.7);
      max-width: 36em;
      margin: 0 auto 36px;
    }

    /* Glass pill + nested white CTA — ref 图4 */
    .signup-shell {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding: 5px 6px 5px 22px;
      gap: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px) saturate(130%);
      -webkit-backdrop-filter: blur(20px) saturate(130%);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.06),
        0 12px 36px rgba(40, 50, 40, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.98);
      transition:
        background 0.32s ease,
        border-color 0.32s ease,
        box-shadow 0.32s ease,
        transform 0.22s ease;
    }

    .signup-shell:hover {
      background: rgba(255, 255, 255, 0.96);
      border-color: #fff;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.06),
        0 16px 44px rgba(40, 55, 38, 0.14),
        inset 0 1px 0 #fff;
      transform: translateY(-1px);
    }

    .signup-shell:focus-within {
      background: #fff;
      border-color: #fff;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.06),
        0 0 0 1px rgba(255, 255, 255, 0.9),
        0 0 0 5px rgba(130, 160, 105, 0.2),
        0 18px 48px rgba(40, 55, 38, 0.16),
        inset 0 1px 0 #fff;
      transform: translateY(-1px);
    }

    .signup-shell:active {
      transform: translateY(0);
      transition-duration: 0.12s;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.06),
        0 8px 28px rgba(40, 50, 40, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .signup-shell:focus-within:active {
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.06),
        0 0 0 1px rgba(255, 255, 255, 0.85),
        0 0 0 4px rgba(130, 160, 105, 0.14),
        0 10px 32px rgba(40, 55, 38, 0.12),
        inset 0 1px 0 #fff;
    }

    .signup-shell input[type="email"] {
      flex: 1;
      min-width: 0;
      padding: 14px 0;
      font-size: 16px;
      font-family: inherit;
      border: none;
      background: transparent;
      color: #1c1c1a;
      outline: none;
      transition: color 0.2s ease;
    }
    .signup-shell input[type="email"]::placeholder {
      color: rgba(28, 28, 26, 0.38);
      transition: color 0.28s ease, opacity 0.28s ease;
    }
    .signup-shell:focus-within input[type="email"]::placeholder {
      color: rgba(28, 28, 26, 0.26);
    }

    .signup-shell button[type="submit"] {
      flex-shrink: 0;
      position: relative;
      display: inline-grid;
      place-items: center;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 999px;
      color: #fff;
      background: #141412;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      box-sizing: border-box;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease,
        width 0.48s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .submit-btn__layer {
      grid-area: 1 / 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      transition:
        opacity 0.42s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.42s cubic-bezier(0.22, 1, 0.36, 1),
        filter 0.42s ease;
    }

    .submit-btn__layer--idle {
      opacity: 1;
      transform: scale(1);
    }

    .submit-btn__layer--done {
      opacity: 0;
      transform: scale(0.88);
      filter: blur(2px);
      pointer-events: none;
    }

    .signup-shell button[type="submit"].is-success .submit-btn__layer--idle {
      position: absolute;
      width: 0;
      height: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
      clip-path: inset(50%);
      opacity: 0;
      transform: scale(0.92);
      filter: blur(1px);
      pointer-events: none;
    }

    .signup-shell button[type="submit"].is-success .submit-btn__layer--done {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
      pointer-events: auto;
    }

    .submit-btn__check {
      flex-shrink: 0;
      display: block;
    }

    .submit-btn__check path {
      stroke-dasharray: 22;
      stroke-dashoffset: 22;
      transition: stroke-dashoffset 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.08s;
    }

    .signup-shell button[type="submit"].is-success .submit-btn__check path {
      stroke-dashoffset: 0;
    }

    .signup-shell button[type="submit"]:hover:not(:disabled):not(.is-success) {
      transform: translateY(-1px);
      background: #2a2a28;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
    }
    .signup-shell button[type="submit"]:active:not(:disabled):not(.is-success) {
      transform: translateY(0) scale(0.98);
      background: #0e0e0c;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.22);
      transition-duration: 0.08s;
    }
    .signup-shell button[type="submit"]:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .signup-shell button[type="submit"].is-success:disabled {
      opacity: 1;
      cursor: default;
      background: #141412;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
    }
    .signup-shell button .ico {
      font-size: 15px;
      line-height: 1;
      opacity: 0.95;
    }

    .fine {
      margin-top: 22px;
      font-size: 12px;
      line-height: 1.55;
      color: rgba(28, 28, 26, 0.38);
      max-width: 34em;
      margin-left: auto;
      margin-right: auto;
    }

    .msg {
      margin-top: 18px;
      font-size: 14px;
      min-height: 22px;
      color: #3d6b2e;
    }
    .msg.err { color: #a14a40; }

    @media (max-width: 540px) {
      .signup-shell {
        flex-direction: column;
        align-items: stretch;
        padding: 14px 14px 14px 20px;
        border-radius: 20px;
      }
      .signup-shell button[type="submit"] {
        justify-content: center;
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .signup-shell,
      .signup-shell input[type="email"]::placeholder {
        transition-duration: 0.01ms;
      }
      .signup-shell:hover,
      .signup-shell:focus-within {
        transform: none;
      }
      .submit-btn__layer,
      .signup-shell button[type="submit"] {
        transition-duration: 0.01ms;
      }
      .signup-shell button[type="submit"] {
        transition-property: transform, box-shadow, background;
      }
      .submit-btn__check path {
        transition-duration: 0.01ms;
      }
      .signup-shell button[type="submit"].is-success .submit-btn__check path {
        stroke-dashoffset: 0;
      }
    }

    /* GSAP “flair cursor follower” (CodePen GreenSock WbbEGmp) — scoped, no body overflow lock */
    .gsap-flair-root {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: visible;
    }

    .gsap-flair-root .flair {
      position: fixed;
      opacity: 0;
      width: 56px;
      height: auto;
      display: block;
      pointer-events: none;
      will-change: transform, opacity;
    }
  </style>
</head>
<body>
  <div class="bg-stack" aria-hidden="true">
    <iframe class="garden-bg" src="/garden/index.html#embed" title="" tabindex="-1"></iframe>
    <div class="bg-veil"></div>
  </div>

  <a class="top-link" href="/">← Shader Playground</a>

  <main>
    <div class="content">
      <span class="badge">The first wave is open</span>
      <h1>Today is <span class="h1-courgette">Your</span> Day</h1>
      <p class="lead">Today isn&rsquo;t a product you open&mdash;it&rsquo;s the day you get back: one agent that knows your life and gets ahead of it.</p>

      <form id="wl" data-endpoint="" novalidate>
        <div class="signup-shell">
          <input id="email" name="email" type="email" autocomplete="email" required
            placeholder="Enter your email" aria-label="Email address">
          <button type="submit" id="submit-btn" aria-label="Join waitlist">
            <span class="submit-btn__layer submit-btn__layer--idle">
              Join Waitlist <span class="ico" aria-hidden="true">↗</span>
            </span>
            <span class="submit-btn__layer submit-btn__layer--done" aria-hidden="true">
              <svg class="submit-btn__check" width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 13l4 4L19 7" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Sent!
            </span>
          </button>
        </div>
        <p class="fine">By joining, you agree we may email you about this product.</p>
        <p class="msg" id="msg" role="status" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <!-- Realistic flowers (RGBA) — source assets in repo flair/; add more <img class="flair"> to vary pool -->
  <div class="gsap-flair-root" aria-hidden="true">
    <img class="flair" src="/waitlist/flair/flower-real-cosmos.png" alt="">
    <img class="flair" src="/waitlist/flair/flower-real-daisy.png" alt="">
    <img class="flair" src="/waitlist/flair/flower-real-cosmos.png" alt="">
    <img class="flair" src="/waitlist/flair/flower-real-daisy.png" alt="">
    <img class="flair" src="/waitlist/flair/flower-real-cosmos.png" alt="">
    <img class="flair" src="/waitlist/flair/flower-real-daisy.png" alt="">
    <img class="flair" src="/waitlist/flair/flower-real-cosmos.png" alt="">
    <img class="flair" src="/waitlist/flair/flower-real-daisy.png" alt="">
    <img class="flair" src="/waitlist/flair/flower-real-cosmos.png" alt="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    /* Adapted from https://codepen.io/GreenSock/pen/WbbEGmp */
    (function () {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      if (window.matchMedia('(pointer: coarse)').matches) return;
      if (typeof gsap === 'undefined') return;

      var flair = gsap.utils.toArray('.gsap-flair-root .flair');
      if (!flair.length) return;

      var gap = 100;
      var index = 0;
      var wrapper = gsap.utils.wrap(0, flair.length);
      gsap.defaults({ duration: 1 });

      var mousePos = { x: 0, y: 0 };
      var lastMousePos = { x: 0, y: 0 };

      function playAnimation(shape) {
        var tl = gsap.timeline();
        tl.from(shape, {
          opacity: 0,
          scale: 0,
          ease: 'elastic.out(1,0.3)',
        })
          .to(
            shape,
            {
              rotation: 'random([-360, 360])',
            },
            '<'
          )
          .to(
            shape,
            {
              y: '120vh',
              ease: 'back.in(0.4)',
              duration: 1,
            },
            0
          );
      }

      window.addEventListener('mousemove', function (e) {
        mousePos.x = e.clientX;
        mousePos.y = e.clientY;
      });

      function imageTrail() {
        var travelDistance = Math.hypot(lastMousePos.x - mousePos.x, lastMousePos.y - mousePos.y);
        if (travelDistance > gap) {
          animateImage();
          lastMousePos.x = mousePos.x;
          lastMousePos.y = mousePos.y;
        }
      }

      function animateImage() {
        var wrappedIndex = wrapper(index);
        var img = flair[wrappedIndex];
        gsap.killTweensOf(img);
        gsap.set(img, { clearProps: 'all' });
        gsap.set(img, {
          opacity: 1,
          left: mousePos.x,
          top: mousePos.y,
          xPercent: -50,
          yPercent: -50,
        });
        playAnimation(img);
        index++;
      }

      gsap.ticker.add(imageTrail);
    })();

    (function () {
      var stack = document.querySelector('.bg-stack');
      function fitBg() {
        if (!stack) return;
        var w = Math.max(window.innerWidth, document.documentElement.clientWidth || 0);
        var h = Math.max(window.innerHeight, document.documentElement.clientHeight || 0);
        stack.style.width = w + 'px';
        stack.style.height = h + 'px';
      }
      fitBg();
      window.addEventListener('resize', fitBg);
      window.addEventListener('orientationchange', fitBg);
    })();

    (function () {
      var form = document.getElementById('wl');
      var msg = document.getElementById('msg');
      var btn = document.getElementById('submit-btn');
      var idleLayer = btn.querySelector('.submit-btn__layer--idle');
      var doneLayer = btn.querySelector('.submit-btn__layer--done');
      var resetSubmitBtnTimer = null;
      var SUCCESS_BTN_RESET_MS = 6000;

      function isValidEmailFormat(s) {
        if (!s || s.length > 254) return false;
        return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(s);
      }

      function clearResetSubmitTimer() {
        if (resetSubmitBtnTimer != null) {
          clearTimeout(resetSubmitBtnTimer);
          resetSubmitBtnTimer = null;
        }
      }

      function resetSubmitButtonToIdle() {
        if (!btn.classList.contains('is-success')) {
          btn.disabled = false;
          return;
        }

        btn.setAttribute('aria-label', 'Join waitlist');
        if (idleLayer) idleLayer.setAttribute('aria-hidden', 'false');
        if (doneLayer) doneLayer.setAttribute('aria-hidden', 'true');
        btn.disabled = false;

        var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (reduceMotion) {
          btn.classList.remove('is-success');
          btn.style.width = '';
          btn.style.boxSizing = '';
          return;
        }

        var wFrom = btn.offsetWidth;
        btn.style.boxSizing = 'border-box';
        btn.style.width = wFrom + 'px';
        btn.classList.remove('is-success');
        btn.style.width = 'auto';
        var wTo = btn.offsetWidth;
        btn.style.width = wFrom + 'px';
        void btn.offsetHeight;
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            btn.style.width = wTo + 'px';
          });
        });

        var cleaned = false;
        function clearInlineWidth() {
          if (cleaned) return;
          cleaned = true;
          btn.style.width = '';
          btn.style.boxSizing = '';
          btn.removeEventListener('transitionend', onWidthEnd);
        }
        function onWidthEnd(ev) {
          if (ev.target !== btn || ev.propertyName !== 'width') return;
          clearInlineWidth();
        }
        btn.addEventListener('transitionend', onWidthEnd);
        setTimeout(clearInlineWidth, 600);
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearResetSubmitTimer();
        msg.textContent = '';
        msg.classList.remove('err');

        var email = (form.email && form.email.value || '').trim();
        if (!email) {
          msg.classList.add('err');
          msg.textContent = 'Please enter your email.';
          return;
        }
        if (!isValidEmailFormat(email)) {
          msg.classList.add('err');
          msg.textContent = 'Please enter a valid email address.';
          return;
        }

        var endpoint = (form.getAttribute('data-endpoint') || '').trim();
        btn.disabled = true;
        var done = false;

        function setSentButtonState() {
          done = true;
          btn.setAttribute('aria-label', 'Sent');
          if (idleLayer) idleLayer.setAttribute('aria-hidden', 'true');
          if (doneLayer) doneLayer.setAttribute('aria-hidden', 'false');

          var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          if (reduceMotion) {
            btn.classList.add('is-success');
            resetSubmitBtnTimer = setTimeout(function () {
              resetSubmitBtnTimer = null;
              resetSubmitButtonToIdle();
            }, SUCCESS_BTN_RESET_MS);
            return;
          }

          var wFrom = btn.offsetWidth;
          btn.style.boxSizing = 'border-box';
          btn.style.width = wFrom + 'px';
          btn.classList.add('is-success');
          btn.style.width = 'auto';
          var wTo = btn.offsetWidth;
          btn.style.width = wFrom + 'px';
          void btn.offsetHeight;
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              btn.style.width = wTo + 'px';
            });
          });

          var cleaned = false;
          function clearInlineWidth() {
            if (cleaned) return;
            cleaned = true;
            btn.style.width = '';
            btn.style.boxSizing = '';
            btn.removeEventListener('transitionend', onWidthEnd);
          }
          function onWidthEnd(ev) {
            if (ev.target !== btn || ev.propertyName !== 'width') return;
            clearInlineWidth();
          }
          btn.addEventListener('transitionend', onWidthEnd);
          setTimeout(clearInlineWidth, 600);

          resetSubmitBtnTimer = setTimeout(function () {
            resetSubmitBtnTimer = null;
            resetSubmitButtonToIdle();
          }, SUCCESS_BTN_RESET_MS);
        }

        try {
          if (endpoint) {
            var res = await fetch(endpoint, {
              method: 'POST',
              headers: { Accept: 'application/json', 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: email, _subject: 'Shader Playground waitlist' }),
            });
            if (!res.ok) throw new Error('submit failed');
            msg.textContent = "Thanks! We'll email you soon—check your inbox.";
            form.email.value = '';
            setSentButtonState();
          } else {
            msg.textContent = "Thanks! We'll email you soon—check your inbox.";
            setSentButtonState();
          }
        } catch (err) {
          msg.classList.add('err');
          msg.textContent = 'Something went wrong. Try again in a moment.';
        } finally {
          if (!done) btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
