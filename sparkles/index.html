<body>

<div class="title">

<div class="wrap">
  <canvas id="c"></canvas>
  <img class="paper" src="canvas.png" alt="">

<div class="desc">
  <p>Sparkles on a lake, swans afloat, and alas, you are here.</p>
  <strong>Dev Notes.</strong>
  <p>Written with raymarching, post processed sparkles, and frequency modulated halftones.</p>
</div>

<script>
const CW = 500, CH = 307;
const canvas = document.getElementById('c');
const dpr = Math.min(window.devicePixelRatio, 2);
canvas.width = CW * dpr;
canvas.height = CH * dpr;
const gl = canvas.getContext('webgl2');
if (!gl) { document.body.innerHTML = '<p>WebGL2 required</p>'; throw ''; }

const CONFIG = {
  waveHeight: 2.7,
  waveScale: 0.08,
  waveSpeed: 0.06,
  oceanRadius: 400,
  sunAzimuth: -2.8,
  sunElevation: 0.85,
  sunColor: [1.0, 0.902, 0.8],
  sunStrength: 3.0,
  surfaceColor: [0.184, 0.373, 0.42],
  depthColor: [0.286, 0.431, 0.529],
  scatterColor: [0.49, 0.859, 0.792],
  cameraPos: [-2.22, 20.84, 11.94],
  lookAt: [-3.68, 7.85, -4.34],
  fov: 60,
};

const SPARKLE_CONFIG = {
  cellSearchRadius: 4,
  cellSize: 20.0,
  fadeIn: 0.55,
  fadeOut: 0.82,
  maxShowDuration: 0.8,
  hideDuration: 0.2,
  coreColor: [1.0, 1.0, 1.0],
  secondaryCoreColor: [0.91, 0.86, 0.82],
  coreGlowColor: [1.0, 0.9, 0.83],
  streakColor: [1.0, 0.973, 0.875],
};

/* ── Fullscreen quad vertex shader ── */
const quadVert = `#version 300 es
precision highp float;
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

/* ══════════════════════════════════════════
   PASS 1: Ocean raymarching (render to FBO)
   ══════════════════════════════════════════ */
const oceanFrag = `#version 300 es
precision highp float;
out vec4 outColor;

uniform float uTime;
uniform vec2 uResolution;
uniform vec3 uCameraPos;
uniform mat4 uProjectionMatrixInverse;
uniform mat4 uViewMatrixInverse;
uniform float uWaveHeight;
uniform float uWaveScale;
uniform float uWaveSpeed;
uniform vec3 uSunDirection;
uniform vec3 uSurfaceColor;
uniform vec3 uScatterColor;
uniform sampler2D uNoiseTexture;
uniform float uOceanRadius;
uniform vec3 uSunColor;
uniform float uSunStrength;
uniform vec3 uDepthColor;

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    float a = texture(uNoiseTexture, (i + vec2(0.5, 0.5)) * 0.00390625).r;
    float b = texture(uNoiseTexture, (i + vec2(1.5, 0.5)) * 0.00390625).r;
    float c = texture(uNoiseTexture, (i + vec2(0.5, 1.5)) * 0.00390625).r;
    float d = texture(uNoiseTexture, (i + vec2(1.5, 1.5)) * 0.00390625).r;
    return a + (b - a) * u.x + (c - a) * u.y + (a - b - c + d) * u.x * u.y - 0.5;
}

const float angle = 3.14;
const float sA = sin(angle);
const float cA = cos(angle);
const mat2 octaveRotation = mat2(cA, sA, -sA, cA);
const int numOctaves = 9;
const int maxMarchIters = 24;

float fbm(vec3 pos, int limit) {
    float res = 0.0, freq = 1.0, amp = 1.0;
    for (int i = 0; i < numOctaves; i++) {
        if (i >= limit) break;
        res += noise(freq * (pos.xz + uTime * (uWaveSpeed * float(numOctaves - i + 1)))) * amp;
        freq *= 1.75;
        amp *= 0.5;
        pos.xz *= octaveRotation;
    }
    return res;
}

float oceanHeight(vec2 xz, int octaves) {
    float result = uWaveHeight * fbm(vec3(xz.x, 0.0, xz.y) * uWaveScale, octaves);
    float dist = length(xz);
    float fade = 1.0 - smoothstep(uOceanRadius * 0.7, uOceanRadius, dist);
    return mix(-100.0, result, fade);
}

vec3 getSkyColor(vec3 rd) {
    vec3 skyBlue = vec3(0.35, 0.55, 0.82);
    vec3 darkBlue = vec3(0.1, 0.2, 0.45);
    vec3 white = vec3(1.0);
    float t = max(rd.y, 0.0);
    vec3 skyGradient = mix(skyBlue, darkBlue, smoothstep(0.0, 0.8, t));
    vec3 sky = mix(white, skyGradient, smoothstep(-0.02, 0.15, rd.y));
    float sunDot = max(dot(rd, uSunDirection), 0.0);
    sky += uSunColor * pow(sunDot, 256.0) * 2.0;
    sky += uSunColor * pow(sunDot, 8.0) * 0.3;
    return sky;
}

float approximateIntersection(vec3 ro, vec3 rd, float tLow, float tHigh) {
    for (int j = 0; j < 6; j++) {
        float tMid = 0.5 * (tLow + tHigh);
        vec3 pm = ro + rd * tMid;
        float hm = oceanHeight(pm.xz, 3);
        if (pm.y - hm < 0.0) tHigh = tMid; else tLow = tMid;
    }
    return 0.5 * (tLow + tHigh);
}

float raymarch(vec3 ro, vec3 rd, out float hitDist) {
    if (rd.y >= 0.0) { hitDist = 1e6; return 0.0; }
    float ceiling = uWaveHeight * 1.1;
    float maxDist = uOceanRadius * 3.0;
    float startDist = 0.0;
    if (ro.y > ceiling) startDist = (ceiling - ro.y) / rd.y;
    hitDist = startDist;
    float stepSize = 0.0;
    for (int i = 0; i < maxMarchIters; i++) {
        vec3 p = ro + rd * hitDist;
        float diff = p.y - oceanHeight(p.xz, 3);
        if (diff < 0.01) {
            hitDist = approximateIntersection(ro, rd, hitDist - stepSize, hitDist);
            return 1.0;
        }
        stepSize = max(diff * 0.5, 0.1 + hitDist * 0.01);
        hitDist += stepSize;
        if (hitDist > maxDist) break;
    }
    hitDist = 1e6;
    return 0.0;
}

vec3 getNormal(vec3 p, float hitDist) {
    float eps = (0.05 / uResolution.y) * pow(hitDist, 1.55);
    float dx = oceanHeight(p.xz - vec2(eps, 0.0), 7) - oceanHeight(p.xz + vec2(eps, 0.0), 7);
    float dz = oceanHeight(p.xz - vec2(0.0, eps), 7) - oceanHeight(p.xz + vec2(0.0, eps), 7);
    return normalize(vec3(dx, 2.0 * eps, dz));
}

vec3 tonemap(vec3 x) {
    float a=2.51, b=0.03, c=2.43, d=0.59, e=0.14;
    return clamp((x*(a*x+b))/(x*(c*x+d)+e), 0.0, 1.0);
}

void main() {
    vec2 ndc = (gl_FragCoord.xy / uResolution) * 2.0 - 1.0;
    vec4 clipSpace = vec4(ndc, 1.0, 1.0);
    vec4 viewSpace = uProjectionMatrixInverse * clipSpace;
    viewSpace = vec4(viewSpace.xy, -1.0, 0.0);
    vec3 rayDir = normalize((uViewMatrixInverse * viewSpace).xyz);
    vec3 rayOrigin = uCameraPos;
    vec3 color = getSkyColor(rayDir);

    float hitDist;
    float hit = raymarch(rayOrigin, rayDir, hitDist);
    if (hit > 0.5) {
        vec3 p = rayOrigin + rayDir * hitDist;
        vec3 n = getNormal(p, hitDist);
        vec3 viewDir = -rayDir;
        float waterReflectance = 0.02;
        float cosTheta = max(dot(n, viewDir), 0.0);
        float fresnel = waterReflectance + (1.0 - waterReflectance) * pow(1.0 - cosTheta, 5.0);
        vec3 skyColor = getSkyColor(reflect(rayDir, n));
        float crestFactor = clamp((p.y / uWaveHeight) + 0.5, 0.0, 1.0);
        vec3 baseWaterColor = mix(uDepthColor, uSurfaceColor, crestFactor);
        vec3 ambient = baseWaterColor * 0.3;
        float sunAlignment = max(dot(n, uSunDirection), 0.0);
        vec3 diffuse = baseWaterColor * sunAlignment * 0.7;
        vec3 halfDir = normalize(uSunDirection + viewDir);
        float specularIntensity = pow(max(dot(n, halfDir), 0.0), 256.0);
        vec3 specular = uSunColor * specularIntensity * uSunStrength;
        vec3 backlitDir = normalize(-uSunDirection + n * 0.3);
        float scatterIntensity = pow(max(dot(viewDir, backlitDir), 0.0), 4.0) * 1.1 * crestFactor;
        vec3 subsurface = uScatterColor * scatterIntensity;
        vec3 waterColor = ambient + diffuse + subsurface;
        color = mix(waterColor, skyColor, fresnel) + specular;
    }
    color = tonemap(color);
    color = pow(color, vec3(1.0/2.2));
    outColor = vec4(color, 1.0);
}
`;

/* ══════════════════════════════════════════
   PASS 2: Sparkle mask computation
   Reads ocean FBO + previous mask, writes sparkle mask
   ══════════════════════════════════════════ */
const sparkleMaskFrag = `#version 300 es
precision highp float;
out vec4 outColor;

uniform float time;
uniform vec2 resolution;
uniform sampler2D inputBuffer;
uniform sampler2D prevBuffer;
uniform float fadeOut;
uniform float fadeIn;
uniform float maxShowDuration;
uniform float hideDuration;
uniform vec2 contentPadding;
uniform float seed;

#define TAU 6.2831853

struct SparkleConfig {
    float showDuration;
    float fadeInFactor;
    float fadeOutFactor;
    float coreSize;
    float coreBlur;
    float coreGlowBlur;
    float coreGlowStrength;
    float wobbleAmount;
    vec2 streakCountRange;
    float streakGlowBlur;
    vec2 streakLengthRange;
    float streakAngleJitter;
    vec2 streakOpacityRange;
    vec2 coreGlowOffsetRange;
};

const int CELL_SEARCH_RADIUS = 4;
const float cellSize = 20.0;

const int SPECIES_BASE = 0;
const int SPECIES_SPIKY = 1;
const int SPECIES_SPECKLE = 2;
const int SPECIES_GLINT = 3;
const int SPECIES_CIRCLE = 4;

const vec2 WEIGHT_BASE = vec2(0.1, 0.6);
const vec2 WEIGHT_SPIKY = vec2(0.2, 0.3);
const vec2 WEIGHT_SPECKLE = vec2(0.3, 0.1);
const vec2 WEIGHT_GLINT = vec2(0.0, 0.5);
const vec2 WEIGHT_CIRCLE = vec2(2.0, 0.0);

int getSpeciesId(float shapeSelector, float luma) {
    float wBase = mix(WEIGHT_BASE.x, WEIGHT_BASE.y, luma);
    float wSpiky = mix(WEIGHT_SPIKY.x, WEIGHT_SPIKY.y, luma);
    float wSpeckle = mix(WEIGHT_SPECKLE.x, WEIGHT_SPECKLE.y, luma);
    float wGlint = mix(WEIGHT_GLINT.x, WEIGHT_GLINT.y, luma);
    float wCircle = mix(WEIGHT_CIRCLE.x, WEIGHT_CIRCLE.y, luma);
    float total = wBase + wSpiky + wSpeckle + wGlint + wCircle;
    float r = shapeSelector * total;
    if (r < wBase) return SPECIES_BASE;
    if (r < wBase + wSpiky) return SPECIES_SPIKY;
    if (r < wBase + wSpiky + wSpeckle) return SPECIES_SPECKLE;
    if (r < wBase + wSpiky + wSpeckle + wGlint) return SPECIES_GLINT;
    return SPECIES_CIRCLE;
}

SparkleConfig getConfig(int speciesId) {
    SparkleConfig c;
    c.showDuration = 1.0;
    c.fadeInFactor = 0.1;
    c.fadeOutFactor = 0.8;
    c.coreSize = 0.6;
    c.coreBlur = 0.6;
    c.coreGlowBlur = 20.0;
    c.coreGlowStrength = 0.65;
    c.wobbleAmount = 0.2;
    c.streakCountRange = vec2(4.0, 4.0);
    c.streakGlowBlur = 17.0;
    c.streakLengthRange = vec2(3.0, 4.0);
    c.streakAngleJitter = 0.05;
    c.streakOpacityRange = vec2(0.8, 1.0);
    c.coreGlowOffsetRange = vec2(-2.0, 0.0);

    if (speciesId == SPECIES_SPIKY) {
        c.showDuration = 0.8;
        c.fadeInFactor = 0.2;
        c.fadeOutFactor = 0.2;
        c.coreSize = 0.5;
        c.coreBlur = 0.7;
        c.coreGlowBlur = 20.0;
        c.coreGlowStrength = 0.95;
        c.wobbleAmount = 0.5;
        c.streakCountRange = vec2(5.0, 9.0);
        c.streakGlowBlur = 0.3;
        c.streakLengthRange = vec2(5.5, 6.0);
        c.streakAngleJitter = 0.9;
        c.streakOpacityRange = vec2(0.2, 0.7);
        c.coreGlowOffsetRange = vec2(-2.0, 0.0);
    }

    if (speciesId == SPECIES_SPECKLE) {
        c.showDuration = 0.2;
        c.fadeInFactor = 0.5;
        c.fadeOutFactor = 0.2;
        c.coreSize = 0.5;
        c.coreBlur = 0.6;
        c.coreGlowBlur = 20.0;
        c.coreGlowStrength = 0.55;
        c.wobbleAmount = 0.5;
        c.streakCountRange = vec2(0.0, 3.0);
        c.streakGlowBlur = 5.0;
        c.streakLengthRange = vec2(1.0, 1.5);
        c.streakAngleJitter = 0.5;
        c.streakOpacityRange = vec2(0.8, 0.9);
        c.coreGlowOffsetRange = vec2(-2.0, 2.0);
    }

    if (speciesId == SPECIES_GLINT) {
        c.showDuration = 0.2;
        c.fadeInFactor = 0.5;
        c.fadeOutFactor = 0.2;
        c.coreSize = 0.3;
        c.coreBlur = 2.0;
        c.coreGlowBlur = 20.0;
        c.coreGlowStrength = 0.55;
        c.wobbleAmount = 0.3;
        c.streakCountRange = vec2(0.0, 4.0);
        c.streakGlowBlur = 5.0;
        c.streakLengthRange = vec2(0.5, 1.0);
        c.streakAngleJitter = 0.0;
        c.streakOpacityRange = vec2(0.3, 0.5);
        c.coreGlowOffsetRange = vec2(-1.0, 1.0);
    }

    if (speciesId == SPECIES_CIRCLE) {
        c.showDuration = 1.5;
        c.fadeInFactor = 0.3;
        c.fadeOutFactor = 0.7;
        c.coreSize = 0.9;
        c.coreBlur = 1.0;
        c.coreGlowBlur = 0.0;
        c.coreGlowStrength = 0.0;
        c.wobbleAmount = 0.1;
        c.streakCountRange = vec2(0.0, 0.0);
        c.streakGlowBlur = 10.0;
        c.streakLengthRange = vec2(2.0, 4.0);
        c.streakAngleJitter = 0.1;
        c.streakOpacityRange = vec2(0.8, 1.0);
        c.coreGlowOffsetRange = vec2(-2.0, 0.0);
    }

    return c;
}

float streakOpacityFn(float t, int speciesId) {
    if (speciesId == SPECIES_SPECKLE) return 0.0;
    if (speciesId == SPECIES_GLINT) return 0.0;
    if (speciesId == SPECIES_SPIKY) return 1.0;
    if (speciesId == SPECIES_BASE) return 1.3 - t;
    return 1.0;
}

float streakWidthFn(float t, float len, int speciesId) {
    if (speciesId == SPECIES_SPECKLE) {
        float taper = mix(6.0, 50.0, clamp((len - 3.0) / 6.0, 0.0, 1.0));
        return 1.0 * pow(1.0 - t, taper);
    }
    if (speciesId == SPECIES_GLINT) {
        float taper = mix(6.0, 50.0, clamp((len - 3.0) / 6.0, 0.0, 1.0));
        return 1.0 * pow(1.0 - t, taper);
    }
    if (speciesId == SPECIES_SPIKY) {
        float taper = mix(6.0, 30.0, clamp((len - 3.0) / 4.0, 0.0, 1.0));
        return 2.0 * pow(1.0 - t, taper);
    }
    float taper = mix(6.0, 50.0, clamp((len - 3.0) / 6.0, 0.0, 1.0));
    return 2.0 * pow(1.0 - t, taper);
}

float streakGlowOpacityFn(float t, int speciesId) {
    if (speciesId == SPECIES_SPECKLE) return 1.0 - t;
    if (speciesId == SPECIES_GLINT) return 1.0 - t;
    if (speciesId == SPECIES_SPIKY) return 0.9 - t;
    return 0.9 - t;
}

float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise1d(float t, float period) {
    float i = floor(t);
    float f = fract(t);
    f = f * f * (3.0 - 2.0 * f);
    return mix(hash(vec2(mod(i, period), 0.0)), hash(vec2(mod(i + 1.0, period), 0.0)), f);
}

float borderShapeNoise(vec2 pos) {
    float angle = atan(pos.y, pos.x) + 3.14159265;
    float t = angle / TAU;
    float n = 0.65 * noise1d(t * 12.0 + seed, 12.0)
            + 0.35 * noise1d(t * 23.0 + seed * 3.7, 23.0);
    return (n - 0.45) * 4.0;
}

float borderDist(vec2 pos, vec2 center, vec2 halfSz) {
    float cornerRadius = 15.0;
    vec2 edgeDist = abs(pos - center) - halfSz + cornerRadius;
    float rectDist = length(max(edgeDist, 0.0)) + min(max(edgeDist.x, edgeDist.y), 0.0) - cornerRadius;
    return rectDist + borderShapeNoise(pos - center);
}

float getLuma(vec3 c) {
    return dot(c, vec3(0.299, 0.587, 0.114));
}

float sparkleThreshold(float luma) {
    return pow(smoothstep(0.7, 1.0, luma), 2.0) * 0.4;
}

float baseRadius(float luma, vec2 pixel) {
    float yFrac = pixel.y / resolution.y;
    float scale = mix(1.0, 0.8, yFrac);
    return step(0.9, luma) * cellSize * 2.5 * scale;
}

float getRadius(float luma, float cycleTime, vec2 pixel, float showDuration) {
    if (cycleTime < showDuration) {
        return baseRadius(luma, pixel);
    }
    return 0.0;
}

vec3 sparkleShape(vec2 pixel, vec2 cellCoords, float radius, float cycleTime,
                  float streakStretchAmount, SparkleConfig config, int speciesId) {
    vec2 cellCenter = (cellCoords + 0.5) * cellSize;
    vec2 toPixel = pixel - cellCenter;
    float pixelDist = length(toPixel);
    float pixelAngle = atan(toPixel.y, toPixel.x);

    float showDuration = config.showDuration;
    float fadeInFactor = config.fadeInFactor;
    float fadeOutFactor = config.fadeOutFactor;
    float coreSize = config.coreSize;
    float coreBlur = config.coreBlur;
    float coreGlowBlur = config.coreGlowBlur;
    float coreGlowStrength = config.coreGlowStrength;
    float wobbleAmount = config.wobbleAmount;
    float streakGlowBlur = config.streakGlowBlur;

    float streakRotation = -TAU / 14.0 * (0.5 + 0.5 * sin(time * 0.3));

    float h1 = hash(cellCoords + vec2(7.0, 3.0));
    float h2 = hash(cellCoords + vec2(5.0, 11.0));
    float wobble = 1.0
        + wobbleAmount * 0.2 * sin(pixelAngle * 2.0 + time * 0.3 + h1 * TAU)
        + wobbleAmount * 0.1 * sin(pixelAngle * 3.0 + time * 0.2 + h2 * TAU);

    float fadeInEnd = showDuration * fadeInFactor;
    float fadeOutStart = max(showDuration * (1.0 - fadeOutFactor), fadeInEnd);
    float fadIn = fadeInEnd > 0.0 ? smoothstep(0.0, fadeInEnd, cycleTime) : 1.0;
    float fadOut = fadeOutStart < showDuration ? 1.0 - smoothstep(fadeOutStart, showDuration, cycleTime) : 1.0;
    float fadeEnvelope = fadIn * fadOut;

    float coreDist = (pixelDist / wobble) / max(radius * coreSize, 1.0);
    float coreDistClamp = clamp(coreDist, 0.0, 1.0);
    float coreAmount = 1.0 - smoothstep(0.85 * (1.0 - coreBlur), 0.85, coreDistClamp);
    float coreEdge = max(radius * coreSize, 1.0) * wobble * 0.45;
    float glowOffsetY = mix(config.coreGlowOffsetRange.x, config.coreGlowOffsetRange.y,
                            hash(cellCoords + vec2(31.0, 47.0)));
    float coreGlowPixelDist = length(toPixel - vec2(0.0, glowOffsetY));
    float coreGlowDist = max(coreGlowPixelDist - coreEdge, 0.0);
    float coreGlowAmount = 0.0;
    if (coreGlowBlur > 0.0) {
        float coreGlowFalloff = 1.0 - clamp(coreGlowDist / coreGlowBlur, 0.0, 1.0);
        coreGlowAmount = coreGlowFalloff * coreGlowFalloff * coreGlowStrength;
    }

    float streakCount = floor(mix(config.streakCountRange.x, config.streakCountRange.y + 1.0, h1));
    streakCount = clamp(streakCount, config.streakCountRange.x, config.streakCountRange.y);

    if (streakCount == 0.0) {
        return vec3(coreAmount, 0.0, coreGlowAmount) * fadeEnvelope;
    }

    float growAnimation = 1.0 - pow(1.0 - clamp(cycleTime / (showDuration * 0.4), 0.0, 1.0), 3.0);
    float baseSpacing = TAU / streakCount;

    float approxIndex = floor((pixelAngle - streakRotation) / baseSpacing + 0.5);
    float bestAngleDist = TAU;
    float bestStreakLength = 0.0;
    float bestSpikeOpacity = 1.0;
    for (float offset = -1.0; offset <= 1.0; offset += 1.0) {
        float idx = mod(approxIndex + offset, streakCount);
        float jitter = (hash(cellCoords + vec2(idx * 5.17, idx * 3.31)) - 0.5) * baseSpacing * config.streakAngleJitter;
        float spikeAngle = streakRotation + idx * baseSpacing + jitter;
        float ad = abs(mod(pixelAngle - spikeAngle + 3.14159, TAU) - 3.14159);
        if (ad < bestAngleDist) {
            bestAngleDist = ad;
            float spikeLen = mix(config.streakLengthRange.x, config.streakLengthRange.y,
                                 hash(cellCoords + vec2(idx * 7.13, idx * 11.97)));
            float distFromAxis = abs(mod(spikeAngle - streakRotation + 3.14159, TAU) - 3.14159);
            float stretch = (distFromAxis < 0.2) ? streakStretchAmount : 1.0;
            bestStreakLength = spikeLen * growAnimation * stretch;
            bestSpikeOpacity = mix(config.streakOpacityRange.x, config.streakOpacityRange.y,
                                   hash(cellCoords + vec2(idx * 13.37, idx * 17.53)));
        }
    }

    float angleDist = bestAngleDist;
    float streakLength = bestStreakLength;
    float spikeOpacity = bestSpikeOpacity;

    float streakDist = coreDist / streakLength;
    float streakDistClamp = clamp(streakDist, 0.0, 1.0);
    float streakMask = step(streakDist, 1.0);

    float streakWidth = streakWidthFn(streakDist, streakLength, speciesId);
    float streakShp = smoothstep(streakWidth, streakWidth * 0.15, angleDist);
    float streakAmount = streakShp * streakOpacityFn(streakDistClamp, speciesId) * streakMask * spikeOpacity;

    float streakGlowDist = sin(max(angleDist - streakWidth, 0.0)) * pixelDist;
    float streakGlowAmount = (1.0 - clamp(streakGlowDist / streakGlowBlur, 0.0, 1.0))
                  * streakGlowOpacityFn(streakDistClamp, speciesId) * streakMask * spikeOpacity;

    return vec3(coreAmount, max(streakAmount, streakGlowAmount), coreGlowAmount) * fadeEnvelope;
}

vec4 computeSparkleMask(vec2 pixel) {
    vec2 cell = floor(pixel / cellSize);
    const float streakStretch = 1.6;
    float streakStretchAmount = 1.0 + (streakStretch - 1.0) * pow(max(sin(time * TAU / 2.0), 0.0), 2.0);

    float maxRadius = cellSize * 2.5;
    float maxStreakLen = max(5.0 * streakStretchAmount, 2.0);
    float maxReach = maxRadius * max(maxStreakLen, 1.0) + maxRadius * 0.5;
    int searchRadius = min(int(ceil(maxReach / cellSize)) + 1, CELL_SEARCH_RADIUS);
    maxReach *= maxReach;

    vec2 contentMin = contentPadding * resolution;
    vec2 contentMax = (1.0 - contentPadding) * resolution;
    vec2 borderCenter = (contentMin + contentMax) * 0.5;
    vec2 borderHalfSize = (contentMax - contentMin) * 0.5;

    vec4 maxMask = vec4(0.0);

    for (int dx = -CELL_SEARCH_RADIUS; dx <= CELL_SEARCH_RADIUS; dx++) {
        if (dx < -searchRadius || dx > searchRadius) continue;
        for (int dy = -CELL_SEARCH_RADIUS; dy <= CELL_SEARCH_RADIUS; dy++) {
            if (dy < -searchRadius || dy > searchRadius) continue;
            vec2 cellCoords = cell + vec2(float(dx), float(dy));
            vec2 cellCenter = (cellCoords + 0.5) * cellSize;

            if (borderDist(cellCenter, borderCenter, borderHalfSize) > 0.0) continue;

            vec2 toPx = pixel - cellCenter;
            if (dot(toPx, toPx) > maxReach) continue;

            vec2 cellUv = cellCenter / resolution.xy;
            vec4 cellSample = texture(inputBuffer, cellUv);
            if (cellSample.a < 0.99) continue;
            float luma = getLuma(cellSample.rgb);

            float phaseOffset = hash(cellCoords + vec2(42.0, 13.0));
            float cycleDuration = maxShowDuration + hideDuration;
            float cellCycleDuration = cycleDuration * mix(0.8, 1.2, hash(cellCoords + vec2(77.0, 31.0)));
            float localTime = time + phaseOffset * cellCycleDuration;
            float cycleIndex = floor(localTime / cellCycleDuration);
            float cycleTime = mod(localTime, cellCycleDuration);

            float shapeSelector = hash(cellCoords + vec2(cycleIndex * 3.14, cycleIndex * 1.41));
            int speciesId = getSpeciesId(shapeSelector, luma);
            SparkleConfig config = getConfig(speciesId);

            float showCycleThreshold = hash(cellCoords + vec2(cycleIndex * 1.731, cycleIndex * 2.399));
            if (showCycleThreshold >= sparkleThreshold(luma)) continue;

            float radius = getRadius(luma, cycleTime, cellCenter, config.showDuration);
            radius *= mix(0.9, 1.1, hash(cellCoords + vec2(123.0, 456.0)));

            float streakReach = radius * max(maxStreakLen, 1.0) + radius * 0.5;
            float reach = streakReach * streakReach;
            if (dot(toPx, toPx) > reach) continue;

            vec3 mask = sparkleShape(pixel, cellCoords, radius, cycleTime, streakStretchAmount, config, speciesId);
            float isCircle = (speciesId == SPECIES_CIRCLE) ? 1.0 : 0.0;
            if (mask.r > maxMask.r) {
                maxMask.a = isCircle;
            }
            maxMask.rgb = max(maxMask.rgb, mask.rgb);
        }
    }

    return maxMask;
}

void main() {
    vec2 pixel = gl_FragCoord.xy;
    vec2 uv = pixel / resolution;
    vec4 currSample = texture(inputBuffer, uv);

    if (currSample.a < 0.01) {
        outColor = vec4(0.0);
        return;
    }

    vec4 mask = computeSparkleMask(pixel);
    vec4 prev = texture(prevBuffer, uv);
    vec4 base = prev * fadeOut;
    vec4 result;
    result.rgb = max(base.rgb, mask.rgb);
    result.a = (mask.r > base.r) ? mask.a : base.a;

    outColor = result;
}
`;

/* ══════════════════════════════════════════
   PASS 3: Composite sparkles onto ocean
   ══════════════════════════════════════════ */
const compositeFrag = `#version 300 es
precision highp float;
out vec4 outColor;

uniform sampler2D inputBuffer;
uniform sampler2D sparkleMask;
uniform vec3 coreColor;
uniform vec3 secondaryCoreColor;
uniform vec3 coreGlowColor;
uniform vec3 streakColor;
uniform vec2 uResolution;

vec3 toSrgb(vec3 c) { return pow(c, vec3(1.0 / 2.2)); }
vec3 toLinear(vec3 c) { return pow(c, vec3(2.2)); }

vec3 hardLight(vec3 base, vec3 blend) {
    return mix(
        2.0 * base * blend,
        1.0 - 2.0 * (1.0 - base) * (1.0 - blend),
        step(0.5, blend)
    );
}

void main() {
    vec2 uv = gl_FragCoord.xy / uResolution;
    vec4 inputColor = texture(inputBuffer, uv);

    if (inputColor.a < 0.01) {
        outColor = inputColor;
        return;
    }

    vec4 maskVal = texture(sparkleMask, uv);
    float coreMask = maskVal.r;
    float streakMask = maskVal.g;
    float coreGlowMask = maskVal.b;
    float circleFactor = maskVal.a;

    vec3 base = inputColor.rgb;

    vec3 blendedCoreColor = mix(coreColor, secondaryCoreColor, circleFactor);
    vec3 withCore = mix(base, hardLight(base, blendedCoreColor), coreMask);
    vec3 withGlow = mix(withCore, hardLight(withCore, coreGlowColor), coreGlowMask * (1.0 - coreMask));
    vec3 withStreaks = mix(withGlow, hardLight(withGlow, streakColor), streakMask);

    outColor = vec4(withStreaks, inputColor.a);
}
`;

vec3 hardLight(vec3 base, vec3 blend) {

        2.0 * base * blend,

    );

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

float noise1d(float t, float period) {
    float i = floor(t);
    float f = fract(t);
    f = f * f * (3.0 - 2.0 * f);
    return mix(hash(vec2(mod(i, period), 0.0)), hash(vec2(mod(i + 1.0, period), 0.0)), f);
}

float borderShapeNoise(vec2 pos) {
    float angle = atan(pos.y, pos.x) + 3.14159265;
    float t = angle / TAU;
    float n = 0.65 * noise1d(t * 12.0 + seed, 12.0)
            + 0.35 * noise1d(t * 23.0 + seed * 3.7, 23.0);
    return (n - 0.45) * 4.0;
}

float borderBlurNoise(vec2 pos) {
    float angle = atan(pos.y, pos.x) + 3.14159265;
    float t = angle / TAU;
    float n = noise1d(t * 4.0 + 3.1, 4.0);
    return 0.75 + 0.5 * n;
}

vec3 blurScene(vec2 center) {
    vec2 texelSize = 1.0 / resolution.xy;
    const int NUM_SAMPLES = 16;
    const vec2 disc[16] = vec2[16](
        vec2(-0.1252, 0.0698), vec2( 0.2079,-0.1567),
        vec2(-0.0583, 0.2918), vec2(-0.3108,-0.0927),
        vec2( 0.3781, 0.1473), vec2(-0.2104,-0.3562),
        vec2( 0.0415, 0.4691), vec2( 0.4287,-0.2835),
        vec2(-0.4953, 0.1812), vec2( 0.2346, 0.5108),
        vec2(-0.5621,-0.2249), vec2( 0.5894, 0.0637),
        vec2(-0.3467, 0.5583), vec2( 0.1178,-0.6415),
        vec2( 0.6752,-0.3091), vec2(-0.6138, 0.4826)
    );
    float a = hash(gl_FragCoord.xy) * TAU;
    float cs = cos(a), sn = sin(a);
    mat2 rot = mat2(cs, sn, -sn, cs);
    const float sigma = 0.4;
    const float invTwoSigmaSq = 1.0 / (2.0 * sigma * sigma);
    vec3 sum = vec3(0.0);
    float totalWeight = 0.0;
    for (int i = 0; i < NUM_SAMPLES; i++) {
        vec4 s = texture(inputBuffer, center + rot * disc[i] * blurRadius * texelSize);
        float sLuma = dot(s.rgb, vec3(0.299, 0.587, 0.114));
        if (sLuma > 0.4) {
            vec3 tinted = highlightColor * s.rgb;
            s.rgb = mix(s.rgb, tinted, smoothstep(0.4, 1.0, sLuma) * 0.89);
        }
        float d = length(disc[i]);
        float w = exp(-d * d * invTwoSigmaSq) * s.a;
        sum += s.rgb * w;
        totalWeight += w;
    }
    return totalWeight > 0.0 ? sum / totalWeight : vec3(0.0);
}

float dotCoverage(vec2 pixel, float luma, float fadeOut) {
    luma = pow(min(luma / 0.8, 1.0), 2.0);
    vec2 cell = floor(pixel / dotSpacing);
    int index = int(mod(cell.y, 32.0)) * 32 + int(mod(cell.x, 32.0));
    float threshold = blueNoise[index];
    vec2 dotCenter = (cell + hash(cell + vec2(13.37, 5.71))) * dotSpacing;
    float dotMask = step(threshold, (1.0 - luma) * (1.0 - fadeOut));
    float scale = 0.5 + 0.5 * hash(cell + vec2(43.37, 2.31));
    float radius = dotRadius * scale;
    float dist = length(pixel - dotCenter) / dotSpacing;
    float circle = smoothstep(radius + 0.01, radius - 0.01, dist);
    return dotMask * circle;
}

void main() {
    vec2 uv = gl_FragCoord.xy / resolution;
    vec4 inputColor = texture(inputBuffer, uv);
    float luma = dot(inputColor.rgb, vec3(0.299, 0.587, 0.114));

    vec3 blur = blurScene(uv);
    float blurLuma = dot(blur, vec3(0.299, 0.587, 0.114));

    float borderPadding = ceil(borderBlurFade - borderBlurInset) + 2.0;
    vec2 topLeftCoord = vec2(borderPadding);
    vec2 bottomRightCoord = resolution - vec2(borderPadding);
    vec2 centerCoord = (topLeftCoord + bottomRightCoord) * 0.5;
    vec2 halfSize = (bottomRightCoord - topLeftCoord) * 0.5;

    vec2 corner = sign(gl_FragCoord.xy - centerCoord);
    float cornerRadius = 10.0 + 10.0 * hash(vec2(corner.x * 3.0 + corner.y * 7.0, seed));
    vec2 edgeDist = abs(gl_FragCoord.xy - centerCoord) - halfSize + cornerRadius;
    float rectDist = length(max(edgeDist, 0.0)) + min(max(edgeDist.x, edgeDist.y), 0.0) - cornerRadius;
    float borderDist = rectDist + borderShapeNoise(gl_FragCoord.xy - centerCoord);

    float maxFade = max(borderRisoFade, borderBlurFade + borderBlurInset) * 1.25;
    float dotFadeOut = 0.0;
    float blurFadeOut = 1.0;
    if (-borderDist < maxFade) {
        float fadeAmount = borderBlurNoise(gl_FragCoord.xy - centerCoord);
        float risoFade = borderRisoFade * fadeAmount;
        float blurFade = borderBlurFade * fadeAmount;
        float blurInset = borderBlurInset * fadeAmount;
        dotFadeOut = 1.0 - smoothstep(0.0, risoFade, -borderDist);
        blurFadeOut = smoothstep(blurInset - blurFade, blurInset, -borderDist);
    }

    if (inputColor.a < 0.001) {
        vec3 blurFaded = mix(toLinear(bgColor), blur, blurFadeOut);
        outColor = vec4(blurFaded, 1.0);
        return;
    }

    float coverage = dotCoverage(gl_FragCoord.xy, blurLuma, dotFadeOut);
    vec3 riso = mix(vec3(1.0), color, coverage);

    vec3 blended = hardLight(toSrgb(blur), toSrgb(riso));
    vec3 composited = toLinear(mix(blended, toSrgb(blur), blurAmount));

    vec3 borders = mix(bgColor, composited, blurFadeOut);
    composited = mix(borders, composited, coverage);

    outColor = vec4(composited, 1.0);
}
`;

const RISO_CONFIG = {
  bgColor: [0.949, 0.941, 0.933],
  color: [0.259, 0.482, 0.541],
  dotSpacing: 1.0,
  dotRadius: 0.5,
  blurRadius: 100.0,
  blurAmount: 0.7,
  highlightColor: [0.682, 0.765, 0.769],
  borderRisoFade: 15.0,
  borderBlurFade: 15.0,
  borderBlurInset: 12.0,
};

/* ══════════════════════════════════════════
   WebGL2 Setup
   ══════════════════════════════════════════ */

function createShader(type, src, label) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(label, gl.getShaderInfoLog(s));
  }
  return s;
}

function createProgram(vertSrc, fragSrc, label) {
  const p = gl.createProgram();
  gl.attachShader(p, createShader(gl.VERTEX_SHADER, vertSrc, label+'-vert'));
  gl.attachShader(p, createShader(gl.FRAGMENT_SHADER, fragSrc, label+'-frag'));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(label, gl.getProgramInfoLog(p));
  }
  return p;
}

const oceanProg = createProgram(quadVert, oceanFrag, 'ocean');
const sparkleProg = createProgram(quadVert, sparkleMaskFrag, 'sparkle');
const compositeProg = createProgram(quadVert, compositeFrag, 'composite');
const risoProg = createProgram(quadVert, risoFrag, 'riso');

const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);

function setupQuadAttrib(prog) {
  const loc = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
}

/* ── Noise texture ── */
const noiseSize = 256;
const noiseData = new Uint8Array(noiseSize * noiseSize);
for (let i = 0; i < noiseData.length; i++) noiseData[i] = Math.random() * 255 | 0;
const noiseTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, noiseTex);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.R8, noiseSize, noiseSize, 0, gl.RED, gl.UNSIGNED_BYTE, noiseData);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

/* ── FBO helpers ── */
function createFBO(w, h) {
  const fbo = gl.createFramebuffer();
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fbo, tex };
}

const W = canvas.width, H = canvas.height;
const oceanFBO = createFBO(W, H);
const maskFBO_A = createFBO(W, H);
const maskFBO_B = createFBO(W, H);
const risoFBO = createFBO(W, H);
let maskSwap = false;

/* ── Camera matrices ── */
function perspective(fov, aspect, near, far) {
  const f = 1.0 / Math.tan(fov * Math.PI / 360);
  const nf = 1 / (near - far);
  return new Float32Array([
    f/aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far+near)*nf, -1,
    0, 0, 2*far*near*nf, 0
  ]);
}

function lookAtMat(eye, target, up) {
  const z = normalize3(sub3(eye, target));
  const x = normalize3(cross3(up, z));
  const y = cross3(z, x);
  return new Float32Array([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -dot3(x,eye), -dot3(y,eye), -dot3(z,eye), 1
  ]);
}

function sub3(a,b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function cross3(a,b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function dot3(a,b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function normalize3(v) { const l=Math.sqrt(dot3(v,v)); return [v[0]/l,v[1]/l,v[2]/l]; }

function invertMatrix(m) {
  const inv = new Float32Array(16);
  const m00=m[0],m01=m[1],m02=m[2],m03=m[3],
        m10=m[4],m11=m[5],m12=m[6],m13=m[7],
        m20=m[8],m21=m[9],m22=m[10],m23=m[11],
        m30=m[12],m31=m[13],m32=m[14],m33=m[15];
  const b00=m00*m11-m01*m10, b01=m00*m12-m02*m10,
        b02=m00*m13-m03*m10, b03=m01*m12-m02*m11,
        b04=m01*m13-m03*m11, b05=m02*m13-m03*m12,
        b06=m20*m31-m21*m30, b07=m20*m32-m22*m30,
        b08=m20*m33-m23*m30, b09=m21*m32-m22*m31,
        b10=m21*m33-m23*m31, b11=m22*m33-m23*m32;
  let det=b00*b11-b01*b10+b02*b09+b03*b08-b04*b07+b05*b06;
  if(!det) return inv;
  det=1.0/det;
  inv[0]=(m11*b11-m12*b10+m13*b09)*det;
  inv[1]=(m02*b10-m01*b11-m03*b09)*det;
  inv[2]=(m31*b05-m32*b04+m33*b03)*det;
  inv[3]=(m22*b04-m21*b05-m23*b03)*det;
  inv[4]=(m12*b08-m10*b11-m13*b07)*det;
  inv[5]=(m00*b11-m02*b08+m03*b07)*det;
  inv[6]=(m32*b02-m30*b05-m33*b01)*det;
  inv[7]=(m20*b05-m22*b02+m23*b01)*det;
  inv[8]=(m10*b10-m11*b08+m13*b06)*det;
  inv[9]=(m01*b08-m00*b10-m03*b06)*det;
  inv[10]=(m30*b04-m31*b02+m33*b00)*det;
  inv[11]=(m21*b02-m20*b04-m23*b00)*det;
  inv[12]=(m11*b07-m10*b09-m12*b06)*det;
  inv[13]=(m00*b09-m01*b07+m02*b06)*det;
  inv[14]=(m31*b01-m30*b03-m32*b00)*det;
  inv[15]=(m20*b03-m21*b01+m22*b00)*det;
  return inv;
}

const aspect = CW / CH;
const projMatrix = perspective(CONFIG.fov, aspect, 0.1, 1000);
const viewMatrix = lookAtMat(CONFIG.cameraPos, CONFIG.lookAt, [0,1,0]);
const projInv = invertMatrix(projMatrix);
const viewInv = invertMatrix(viewMatrix);

const sunDir = [
  Math.cos(CONFIG.sunElevation) * Math.sin(CONFIG.sunAzimuth),
  Math.sin(CONFIG.sunElevation),
  Math.cos(CONFIG.sunElevation) * Math.cos(CONFIG.sunAzimuth)
];
const sunDirNorm = normalize3(sunDir);

/* ── Set ocean uniforms ── */
gl.useProgram(oceanProg);
setupQuadAttrib(oceanProg);
const oLoc = name => gl.getUniformLocation(oceanProg, name);
gl.uniform2f(oLoc('uResolution'), W, H);
gl.uniform3fv(oLoc('uCameraPos'), CONFIG.cameraPos);
gl.uniformMatrix4fv(oLoc('uProjectionMatrixInverse'), false, projInv);
gl.uniformMatrix4fv(oLoc('uViewMatrixInverse'), false, viewInv);
gl.uniform1f(oLoc('uWaveHeight'), CONFIG.waveHeight);
gl.uniform1f(oLoc('uWaveScale'), CONFIG.waveScale);
gl.uniform1f(oLoc('uWaveSpeed'), CONFIG.waveSpeed);
gl.uniform3fv(oLoc('uSunDirection'), sunDirNorm);
gl.uniform3fv(oLoc('uSurfaceColor'), CONFIG.surfaceColor);
gl.uniform3fv(oLoc('uScatterColor'), CONFIG.scatterColor);
gl.uniform1f(oLoc('uOceanRadius'), CONFIG.oceanRadius);
gl.uniform3fv(oLoc('uSunColor'), CONFIG.sunColor);
gl.uniform1f(oLoc('uSunStrength'), CONFIG.sunStrength);
gl.uniform3fv(oLoc('uDepthColor'), CONFIG.depthColor);

/* ── Set sparkle mask uniforms ── */
gl.useProgram(sparkleProg);
setupQuadAttrib(sparkleProg);
const sLoc = name => gl.getUniformLocation(sparkleProg, name);
gl.uniform2f(sLoc('resolution'), W, H);
gl.uniform1f(sLoc('fadeOut'), SPARKLE_CONFIG.fadeOut);
gl.uniform1f(sLoc('fadeIn'), SPARKLE_CONFIG.fadeIn);
gl.uniform1f(sLoc('maxShowDuration'), SPARKLE_CONFIG.maxShowDuration);
gl.uniform1f(sLoc('hideDuration'), SPARKLE_CONFIG.hideDuration);
const padding = 5.0 / W;
gl.uniform2f(sLoc('contentPadding'), padding, padding * (W/H));
gl.uniform1f(sLoc('seed'), Math.random());

/* ── Set composite uniforms ── */
gl.useProgram(compositeProg);
setupQuadAttrib(compositeProg);
const cLoc = name => gl.getUniformLocation(compositeProg, name);
gl.uniform2f(cLoc('uResolution'), W, H);
gl.uniform3fv(cLoc('coreColor'), SPARKLE_CONFIG.coreColor);
gl.uniform3fv(cLoc('secondaryCoreColor'), SPARKLE_CONFIG.secondaryCoreColor);
gl.uniform3fv(cLoc('coreGlowColor'), SPARKLE_CONFIG.coreGlowColor);
gl.uniform3fv(cLoc('streakColor'), SPARKLE_CONFIG.streakColor);

/* ── Set riso uniforms ── */
gl.useProgram(risoProg);
setupQuadAttrib(risoProg);
const rLoc = name => gl.getUniformLocation(risoProg, name);
gl.uniform2f(rLoc('resolution'), W, H);
gl.uniform3fv(rLoc('color'), RISO_CONFIG.color);
gl.uniform1f(rLoc('dotSpacing'), RISO_CONFIG.dotSpacing);
gl.uniform1f(rLoc('dotRadius'), RISO_CONFIG.dotRadius);
gl.uniform1f(rLoc('blurRadius'), RISO_CONFIG.blurRadius * (H / 1080));
gl.uniform1f(rLoc('blurAmount'), RISO_CONFIG.blurAmount);
gl.uniform3fv(rLoc('highlightColor'), RISO_CONFIG.highlightColor);
gl.uniform3fv(rLoc('bgColor'), RISO_CONFIG.bgColor);
gl.uniform1f(rLoc('borderRisoFade'), RISO_CONFIG.borderRisoFade);
gl.uniform1f(rLoc('borderBlurFade'), RISO_CONFIG.borderBlurFade);
gl.uniform1f(rLoc('borderBlurInset'), RISO_CONFIG.borderBlurInset);
gl.uniform1f(rLoc('seed'), Math.random());

/* ── Animation loop ── */
const start = performance.now();
const oTime = gl.getUniformLocation(oceanProg, 'uTime');
const sTime = gl.getUniformLocation(sparkleProg, 'time');

function frame() {
  const t = (performance.now() - start) * 0.001;

  /* Pass 1: render ocean to FBO */
  gl.useProgram(oceanProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, oceanFBO.fbo);
  gl.viewport(0, 0, W, H);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, noiseTex);
  gl.uniform1i(oLoc('uNoiseTexture'), 0);
  gl.uniform1f(oTime, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  /* Pass 2: compute sparkle mask (ping-pong) */
  const readMask = maskSwap ? maskFBO_B : maskFBO_A;
  const writeMask = maskSwap ? maskFBO_A : maskFBO_B;

  gl.useProgram(sparkleProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, writeMask.fbo);
  gl.viewport(0, 0, W, H);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, oceanFBO.tex);
  gl.uniform1i(sLoc('inputBuffer'), 0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, readMask.tex);
  gl.uniform1i(sLoc('prevBuffer'), 1);
  gl.uniform1f(sTime, t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  maskSwap = !maskSwap;

  /* Pass 3: riso halftone + blur + border → risoFBO */
  gl.useProgram(risoProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, risoFBO.fbo);
  gl.viewport(0, 0, W, H);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, oceanFBO.tex);
  gl.uniform1i(rLoc('inputBuffer'), 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  /* Pass 4: composite sparkles onto riso → screen */
  gl.useProgram(compositeProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, risoFBO.tex);
  gl.uniform1i(cLoc('inputBuffer'), 0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, writeMask.tex);
  gl.uniform1i(cLoc('sparkleMask'), 1);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  requestAnimationFrame(frame);
}
frame();
</script>
