<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparkles</title>
<script src="../nav.js" defer></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8e4e0;
    font-family: 'Georgia', serif;
    color: #333;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px 40px;
  }
  .title { text-align: center; margin-bottom: 20px; }
  .title h1 { font-size: 1rem; font-weight: 600; }
  .title p { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .wrap {
    position: relative;
    width: 500px; height: 307px;
    overflow: hidden; border-radius: 4px;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .paper {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    mix-blend-mode: color-burn;
    object-fit: cover;
  }
  .desc {
    width: 500px; margin-top: 20px;
    font-size: 0.8rem; line-height: 1.6; color: #666;
  }
  .desc strong { display: block; font-size: 0.75rem; margin-top: 12px; }
  @media (max-width: 580px) {
    .wrap { width: 300px; height: 350px; }
    .desc { width: 340px; }
  }
</style>
</head>
<body>

<div class="title">
  <h1>Sparkles</h1>
  <p>Mar 2026</p>
</div>

<div class="wrap">
  <canvas id="c"></canvas>
  <img class="paper" src="canvas.png" alt="">
</div>

<div class="desc">
  <p>Sparkles on a lake, swans afloat, and alas, you are here.</p>
  <strong>Dev Notes.</strong>
  <p>Written with raymarching, post processed sparkles, and frequency modulated halftones.</p>
</div>

<script>
const CW = 500, CH = 307;
const canvas = document.getElementById('c');
const dpr = Math.min(window.devicePixelRatio, 2);
canvas.width = CW * dpr;
canvas.height = CH * dpr;
const gl = canvas.getContext('webgl2');
if (!gl) { document.body.innerHTML = '<p>WebGL2 required</p>'; throw ''; }

const CONFIG = {
  waveHeight: 2.7,
  waveScale: 0.08,
  waveSpeed: 0.06,
  oceanRadius: 400,
  sunAzimuth: -2.8,
  sunElevation: 0.85,
  sunColor: [1.0, 0.902, 0.8],
  sunStrength: 3.0,
  surfaceColor: [0.184, 0.373, 0.42],
  depthColor: [0.286, 0.431, 0.529],
  scatterColor: [0.49, 0.859, 0.792],
  cameraPos: [-2.22, 20.84, 11.94],
  lookAt: [-3.68, 7.85, -4.34],
  fov: 60,
};

function hexToLinear(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return [r, g, b];
}

const vertSrc = `#version 300 es
precision highp float;
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const fragSrc = `#version 300 es
precision highp float;
out vec4 outColor;

uniform float uTime;
uniform vec2 uResolution;
uniform vec3 uCameraPos;
uniform mat4 uProjectionMatrixInverse;
uniform mat4 uViewMatrixInverse;
uniform float uWaveHeight;
uniform float uWaveScale;
uniform float uWaveSpeed;
uniform vec3 uSunDirection;
uniform vec3 uSurfaceColor;
uniform vec3 uScatterColor;
uniform sampler2D uNoiseTexture;
uniform float uOceanRadius;
uniform vec3 uSunColor;
uniform float uSunStrength;
uniform vec3 uDepthColor;

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    float a = texture(uNoiseTexture, (i + vec2(0.5, 0.5)) * 0.00390625).r;
    float b = texture(uNoiseTexture, (i + vec2(1.5, 0.5)) * 0.00390625).r;
    float c = texture(uNoiseTexture, (i + vec2(0.5, 1.5)) * 0.00390625).r;
    float d = texture(uNoiseTexture, (i + vec2(1.5, 1.5)) * 0.00390625).r;
    return a + (b - a) * u.x + (c - a) * u.y + (a - b - c + d) * u.x * u.y - 0.5;
}

const float angle = 3.14;
const float sA = sin(angle);
const float cA = cos(angle);
const mat2 octaveRotation = mat2(cA, sA, -sA, cA);
const int numOctaves = 9;
const int maxMarchIters = 24;

float fbm(vec3 pos, int limit) {
    float res = 0.0, freq = 1.0, amp = 1.0;
    for (int i = 0; i < numOctaves; i++) {
        if (i >= limit) break;
        res += noise(freq * (pos.xz + uTime * (uWaveSpeed * float(numOctaves - i + 1)))) * amp;
        freq *= 1.75;
        amp *= 0.5;
        pos.xz *= octaveRotation;
    }
    return res;
}

float oceanHeight(vec2 xz, int octaves) {
    float result = uWaveHeight * fbm(vec3(xz.x, 0.0, xz.y) * uWaveScale, octaves);
    float dist = length(xz);
    float fade = 1.0 - smoothstep(uOceanRadius * 0.7, uOceanRadius, dist);
    return mix(-100.0, result, fade);
}

vec3 getSkyColor(vec3 rd) {
    vec3 skyBlue = vec3(0.35, 0.55, 0.82);
    vec3 darkBlue = vec3(0.1, 0.2, 0.45);
    vec3 white = vec3(1.0);
    float t = max(rd.y, 0.0);
    vec3 skyGradient = mix(skyBlue, darkBlue, smoothstep(0.0, 0.8, t));
    vec3 sky = mix(white, skyGradient, smoothstep(-0.02, 0.15, rd.y));
    float sunDot = max(dot(rd, uSunDirection), 0.0);
    sky += uSunColor * pow(sunDot, 256.0) * 2.0;
    sky += uSunColor * pow(sunDot, 8.0) * 0.3;
    return sky;
}

float approximateIntersection(vec3 ro, vec3 rd, float tLow, float tHigh) {
    for (int j = 0; j < 6; j++) {
        float tMid = 0.5 * (tLow + tHigh);
        vec3 pm = ro + rd * tMid;
        float hm = oceanHeight(pm.xz, 3);
        if (pm.y - hm < 0.0) tHigh = tMid; else tLow = tMid;
    }
    return 0.5 * (tLow + tHigh);
}

float raymarch(vec3 ro, vec3 rd, out float hitDist) {
    if (rd.y >= 0.0) { hitDist = 1e6; return 0.0; }
    float ceiling = uWaveHeight * 1.1;
    float maxDist = uOceanRadius * 3.0;
    float startDist = 0.0;
    if (ro.y > ceiling) startDist = (ceiling - ro.y) / rd.y;
    hitDist = startDist;
    float stepSize = 0.0;
    for (int i = 0; i < maxMarchIters; i++) {
        vec3 p = ro + rd * hitDist;
        float diff = p.y - oceanHeight(p.xz, 3);
        if (diff < 0.01) {
            hitDist = approximateIntersection(ro, rd, hitDist - stepSize, hitDist);
            return 1.0;
        }
        stepSize = max(diff * 0.5, 0.1 + hitDist * 0.01);
        hitDist += stepSize;
        if (hitDist > maxDist) break;
    }
    hitDist = 1e6;
    return 0.0;
}

vec3 getNormal(vec3 p, float hitDist) {
    float eps = (0.05 / uResolution.y) * pow(hitDist, 1.55);
    float dx = oceanHeight(p.xz - vec2(eps, 0.0), 7) - oceanHeight(p.xz + vec2(eps, 0.0), 7);
    float dz = oceanHeight(p.xz - vec2(0.0, eps), 7) - oceanHeight(p.xz + vec2(0.0, eps), 7);
    return normalize(vec3(dx, 2.0 * eps, dz));
}

vec3 tonemap(vec3 x) {
    float a=2.51, b=0.03, c=2.43, d=0.59, e=0.14;
    return clamp((x*(a*x+b))/(x*(c*x+d)+e), 0.0, 1.0);
}

void main() {
    vec2 ndc = (gl_FragCoord.xy / uResolution) * 2.0 - 1.0;
    vec4 clipSpace = vec4(ndc, 1.0, 1.0);
    vec4 viewSpace = uProjectionMatrixInverse * clipSpace;
    viewSpace = vec4(viewSpace.xy, -1.0, 0.0);
    vec3 rayDir = normalize((uViewMatrixInverse * viewSpace).xyz);
    vec3 rayOrigin = uCameraPos;
    vec3 color = getSkyColor(rayDir);

    float hitDist;
    float hit = raymarch(rayOrigin, rayDir, hitDist);
    if (hit > 0.5) {
        vec3 p = rayOrigin + rayDir * hitDist;
        vec3 n = getNormal(p, hitDist);
        vec3 viewDir = -rayDir;
        float waterReflectance = 0.02;
        float cosTheta = max(dot(n, viewDir), 0.0);
        float fresnel = waterReflectance + (1.0 - waterReflectance) * pow(1.0 - cosTheta, 5.0);
        vec3 skyColor = getSkyColor(reflect(rayDir, n));
        float crestFactor = clamp((p.y / uWaveHeight) + 0.5, 0.0, 1.0);
        vec3 baseWaterColor = mix(uDepthColor, uSurfaceColor, crestFactor);
        vec3 ambient = baseWaterColor * 0.3;
        float sunAlignment = max(dot(n, uSunDirection), 0.0);
        vec3 diffuse = baseWaterColor * sunAlignment * 0.7;
        vec3 halfDir = normalize(uSunDirection + viewDir);
        float specularIntensity = pow(max(dot(n, halfDir), 0.0), 256.0);
        vec3 specular = uSunColor * specularIntensity * uSunStrength;
        vec3 backlitDir = normalize(-uSunDirection + n * 0.3);
        float scatterIntensity = pow(max(dot(viewDir, backlitDir), 0.0), 4.0) * 1.1 * crestFactor;
        vec3 subsurface = uScatterColor * scatterIntensity;
        vec3 waterColor = ambient + diffuse + subsurface;
        color = mix(waterColor, skyColor, fresnel) + specular;
    }
    color = tonemap(color);
    color = pow(color, vec3(1.0/2.2));
    outColor = vec4(color, 1.0);
}
`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vertSrc));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fragSrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Noise texture (256x256 random)
const noiseSize = 256;
const noiseData = new Uint8Array(noiseSize * noiseSize);
for (let i = 0; i < noiseData.length; i++) noiseData[i] = Math.random() * 255 | 0;
const noiseTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, noiseTex);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.R8, noiseSize, noiseSize, 0, gl.RED, gl.UNSIGNED_BYTE, noiseData);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

// Camera matrices
function perspective(fov, aspect, near, far) {
  const f = 1.0 / Math.tan(fov * Math.PI / 360);
  const nf = 1 / (near - far);
  return new Float32Array([
    f/aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far+near)*nf, -1,
    0, 0, 2*far*near*nf, 0
  ]);
}

function lookAtMat(eye, target, up) {
  const z = normalize3(sub3(eye, target));
  const x = normalize3(cross3(up, z));
  const y = cross3(z, x);
  return new Float32Array([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -dot3(x,eye), -dot3(y,eye), -dot3(z,eye), 1
  ]);
}

function sub3(a,b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function cross3(a,b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function dot3(a,b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }
function normalize3(v) { const l=Math.sqrt(dot3(v,v)); return [v[0]/l,v[1]/l,v[2]/l]; }

function invertMatrix(m) {
  const inv = new Float32Array(16);
  const m00=m[0],m01=m[1],m02=m[2],m03=m[3],
        m10=m[4],m11=m[5],m12=m[6],m13=m[7],
        m20=m[8],m21=m[9],m22=m[10],m23=m[11],
        m30=m[12],m31=m[13],m32=m[14],m33=m[15];
  const b00=m00*m11-m01*m10, b01=m00*m12-m02*m10,
        b02=m00*m13-m03*m10, b03=m01*m12-m02*m11,
        b04=m01*m13-m03*m11, b05=m02*m13-m03*m12,
        b06=m20*m31-m21*m30, b07=m20*m32-m22*m30,
        b08=m20*m33-m23*m30, b09=m21*m32-m22*m31,
        b10=m21*m33-m23*m31, b11=m22*m33-m23*m32;
  let det=b00*b11-b01*b10+b02*b09+b03*b08-b04*b07+b05*b06;
  if(!det) return inv;
  det=1.0/det;
  inv[0]=(m11*b11-m12*b10+m13*b09)*det;
  inv[1]=(m02*b10-m01*b11-m03*b09)*det;
  inv[2]=(m31*b05-m32*b04+m33*b03)*det;
  inv[3]=(m22*b04-m21*b05-m23*b03)*det;
  inv[4]=(m12*b08-m10*b11-m13*b07)*det;
  inv[5]=(m00*b11-m02*b08+m03*b07)*det;
  inv[6]=(m32*b02-m30*b05-m33*b01)*det;
  inv[7]=(m20*b05-m22*b02+m23*b01)*det;
  inv[8]=(m10*b10-m11*b08+m13*b06)*det;
  inv[9]=(m01*b08-m00*b10-m03*b06)*det;
  inv[10]=(m30*b04-m31*b02+m33*b00)*det;
  inv[11]=(m21*b02-m20*b04-m23*b00)*det;
  inv[12]=(m11*b07-m10*b09-m12*b06)*det;
  inv[13]=(m00*b09-m01*b07+m02*b06)*det;
  inv[14]=(m31*b01-m30*b03-m32*b00)*det;
  inv[15]=(m20*b03-m21*b01+m22*b00)*det;
  return inv;
}

const aspect = CW / CH;
const projMatrix = perspective(CONFIG.fov, aspect, 0.1, 1000);
const viewMatrix = lookAtMat(CONFIG.cameraPos, CONFIG.lookAt, [0,1,0]);
const projInv = invertMatrix(projMatrix);
const viewInv = invertMatrix(viewMatrix);

const sunDir = [
  Math.cos(CONFIG.sunElevation) * Math.sin(CONFIG.sunAzimuth),
  Math.sin(CONFIG.sunElevation),
  Math.cos(CONFIG.sunElevation) * Math.cos(CONFIG.sunAzimuth)
];
const sunDirNorm = normalize3(sunDir);

const loc = name => gl.getUniformLocation(prog, name);
gl.uniform2f(loc('uResolution'), canvas.width, canvas.height);
gl.uniform3fv(loc('uCameraPos'), CONFIG.cameraPos);
gl.uniformMatrix4fv(loc('uProjectionMatrixInverse'), false, projInv);
gl.uniformMatrix4fv(loc('uViewMatrixInverse'), false, viewInv);
gl.uniform1f(loc('uWaveHeight'), CONFIG.waveHeight);
gl.uniform1f(loc('uWaveScale'), CONFIG.waveScale);
gl.uniform1f(loc('uWaveSpeed'), CONFIG.waveSpeed);
gl.uniform3fv(loc('uSunDirection'), sunDirNorm);
gl.uniform3fv(loc('uSurfaceColor'), CONFIG.surfaceColor);
gl.uniform3fv(loc('uScatterColor'), CONFIG.scatterColor);
gl.uniform1f(loc('uOceanRadius'), CONFIG.oceanRadius);
gl.uniform3fv(loc('uSunColor'), CONFIG.sunColor);
gl.uniform1f(loc('uSunStrength'), CONFIG.sunStrength);
gl.uniform3fv(loc('uDepthColor'), CONFIG.depthColor);
gl.activeTexture(gl.TEXTURE0);
gl.bindTexture(gl.TEXTURE_2D, noiseTex);
gl.uniform1i(loc('uNoiseTexture'), 0);

const uTime = loc('uTime');
const start = performance.now();

function frame() {
  gl.uniform1f(uTime, (performance.now() - start) * 0.001);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
